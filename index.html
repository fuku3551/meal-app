<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食事管理アプリ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #f0f5f2 0%, #e8ede9 100%);
      color: #1a2e23;
    }
    .wrap {
      max-width: 440px;
      margin: 0 auto;
      padding: 20px 16px 90px;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      text-align: center;
    }
    .sub {
      text-align: center;
      color: #6f8578;
      font-size: 13px;
      margin-bottom: 18px;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 10px;
      color: #2d8a6e;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #5a6e62;
      margin-bottom: 6px;
      margin-top: 10px;
    }
    input, select, button {
      font-family: inherit;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid #e8ece9;
      background: #f8faf9;
      font-size: 16px;
      outline: none;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .row > * {
      flex: 1;
    }
    .btn {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #2d8a6e, #3aaf8a);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 12px;
    }
    .btn.subbtn {
      background: #fff;
      color: #666;
      border: 2px solid #e0e5e2;
      box-shadow: none;
    }
    .meal-item {
      background: #f8faf9;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .meal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .meal-name {
      font-weight: 700;
      font-size: 14px;
    }
    .meal-meta {
      font-size: 12px;
      color: #6f8578;
      margin-top: 4px;
    }
    .delete-btn {
      border: none;
      background: #f5f5f5;
      color: #999;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 14px;
    }
    .totals {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .total-box {
      flex: 1;
      background: linear-gradient(135deg,#edf7f2,#e3f1ec);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .total-label {
      font-size: 10px;
      color: #5a6e62;
      font-weight: 700;
    }
    .total-value {
      font-size: 20px;
      font-weight: 800;
      color: #2d8a6e;
      margin-top: 2px;
    }
    .small {
      font-size: 11px;
      color: #8a9a91;
    }
    .section-title {
      font-size: 13px;
      font-weight: 800;
      color: #1a2e23;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 11px;
      color: #8a9a91;
      margin-top: 6px;
    }
    .empty {
      text-align: center;
      color: #b0bab4;
      font-size: 13px;
      padding: 16px 0;
    }
    .footer-space {
      height: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>🍽️ 食事管理アプリ</h1>
      <div class="sub">カロリー・PFC・体重をシンプルに管理</div>

      <label for="goalKcal">1日の目標カロリー</label>
      <input id="goalKcal" type="number" placeholder="例：2000" />

      <div class="row">
        <div>
          <label for="goalP">目標P</label>
          <input id="goalP" type="number" placeholder="例：120" />
        </div>
        <div>
          <label for="goalF">目標F</label>
          <input id="goalF" type="number" placeholder="例：50" />
        </div>
        <div>
          <label for="goalC">目標C</label>
          <input id="goalC" type="number" placeholder="例：220" />
        </div>
      </div>

      <button class="btn" onclick="saveGoals()">目標を保存</button>
      <div class="hint">一度保存すると次回も残ります。</div>
    </div>

    <div class="card">
      <div class="section-title">➕ 食べたものを追加</div>

      <label for="mealCategory">食事カテゴリ</label>
      <select id="mealCategory">
        <option value="朝食">朝食</option>
        <option value="昼食">昼食</option>
        <option value="夕食">夕食</option>
        <option value="間食">間食</option>
        <option value="飲み物">飲み物</option>
      </select>

      <label for="foodName">食品名</label>
      <input id="foodName" type="text" placeholder="例：サラダチキン" />

      <div class="row">
        <div>
          <label for="foodKcal">kcal</label>
          <input id="foodKcal" type="number" placeholder="120" />
        </div>
        <div>
          <label for="foodP">P</label>
          <input id="foodP" type="number" step="0.1" placeholder="24" />
        </div>
        <div>
          <label for="foodF">F</label>
          <input id="foodF" type="number" step="0.1" placeholder="1.5" />
        </div>
        <div>
          <label for="foodC">C</label>
          <input id="foodC" type="number" step="0.1" placeholder="3" />
        </div>
      </div>

      <button class="btn" onclick="addFood()">食べたものを追加</button>
    </div>

    <div class="card">
      <div class="section-title">📊 今日の合計</div>
      <div class="totals">
        <div class="total-box">
          <div class="total-label">kcal</div>
          <div class="total-value" id="totalKcal">0</div>
        </div>
        <div class="total-box">
          <div class="total-label">P</div>
          <div class="total-value" id="totalP">0</div>
        </div>
        <div class="total-box">
          <div class="total-label">F</div>
          <div class="total-value" id="totalF">0</div>
        </div>
        <div class="total-box">
          <div class="total-label">C</div>
          <div class="total-value" id="totalC">0</div>
        </div>
      </div>

      <div style="margin-top:12px;">
        <div class="small" id="goalSummary">目標を設定してください</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">⚖️ 体重記録</div>
      <div class="row">
        <div>
          <label for="bodyWeight">体重（kg）</label>
          <input id="bodyWeight" type="number" step="0.1" placeholder="例：72.5" />
        </div>
        <div>
          <label for="bodyFat">体脂肪率（%）</label>
          <input id="bodyFat" type="number" step="0.1" placeholder="例：18.5" />
        </div>
      </div>
      <button class="btn" onclick="saveBody()">体重を記録</button>
      <div id="bodyLogArea" class="hint">まだ記録がありません</div>
    </div>

    <div class="card">
      <div class="section-title">📝 今日の食事一覧</div>
      <div id="mealList"></div>
      <button class="btn subbtn" onclick="resetToday()">今日の記録をリセット</button>
    </div>

    <div class="footer-space"></div>
  </div>

  <script>
    const STORAGE_KEY = "meal-app-html-data";

    let appData = {
      goals: {
        kcal: "",
        p: "",
        f: "",
        c: ""
      },
      meals: [],
      bodyLog: []
    };

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          appData = JSON.parse(raw);
        } catch (e) {
          console.log("load error");
        }
      }

      document.getElementById("goalKcal").value = appData.goals.kcal || "";
      document.getElementById("goalP").value = appData.goals.p || "";
      document.getElementById("goalF").value = appData.goals.f || "";
      document.getElementById("goalC").value = appData.goals.c || "";

      renderMeals();
      renderGoals();
      renderBodyLog();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function saveGoals() {
      appData.goals.kcal = document.getElementById("goalKcal").value;
      appData.goals.p = document.getElementById("goalP").value;
      appData.goals.f = document.getElementById("goalF").value;
      appData.goals.c = document.getElementById("goalC").value;
      saveData();
      renderGoals();
      alert("目標を保存しました");
    }

    function renderGoals() {
      const g = appData.goals;
      const text = `目標 kcal: ${g.kcal || "-"} / P: ${g.p || "-"}g / F: ${g.f || "-"}g / C: ${g.c || "-"}g`;
      document.getElementById("goalSummary").textContent = text;
    }

    function addFood() {
      const category = document.getElementById("mealCategory").value;
      const name = document.getElementById("foodName").value.trim();
      const kcal = Number(document.getElementById("foodKcal").value || 0);
      const p = Number(document.getElementById("foodP").value || 0);
      const f = Number(document.getElementById("foodF").value || 0);
      const c = Number(document.getElementById("foodC").value || 0);

      if (!name) {
        alert("食品名を入力してください");
        return;
      }

      appData.meals.push({
        id: Date.now(),
        category,
        name,
        kcal,
        p,
        f,
        c
      });

      saveData();
      renderMeals();

      document.getElementById("foodName").value = "";
      document.getElementById("foodKcal").value = "";
      document.getElementById("foodP").value = "";
      document.getElementById("foodF").value = "";
      document.getElementById("foodC").value = "";
    }

    function deleteMeal(id) {
      appData.meals = appData.meals.filter(item => item.id !== id);
      saveData();
      renderMeals();
    }

    function renderMeals() {
      const mealList = document.getElementById("mealList");

      if (appData.meals.length === 0) {
        mealList.innerHTML = '<div class="empty">まだ食事記録がありません</div>';
        updateTotals();
        return;
      }

      mealList.innerHTML = appData.meals.map(item => `
        <div class="meal-item">
          <div class="meal-top">
            <div>
              <div class="meal-name">${item.category}｜${item.name}</div>
              <div class="meal-meta">${item.kcal}kcal / P:${item.p}g / F:${item.f}g / C:${item.c}g</div>
            </div>
            <button class="delete-btn" onclick="deleteMeal(${item.id})">×</button>
          </div>
        </div>
      `).join("");

      updateTotals();
    }

    function updateTotals() {
      const totals = appData.meals.reduce((acc, item) => {
        acc.kcal += Number(item.kcal || 0);
        acc.p += Number(item.p || 0);
        acc.f += Number(item.f || 0);
        acc.c += Number(item.c || 0);
        return acc;
      }, { kcal: 0, p: 0, f: 0, c: 0 });

      document.getElementById("totalKcal").textContent = Math.round(totals.kcal);
      document.getElementById("totalP").textContent = Math.round(totals.p * 10) / 10;
      document.getElementById("totalF").textContent = Math.round(totals.f * 10) / 10;
      document.getElementById("totalC").textContent = Math.round(totals.c * 10) / 10;
    }

    function saveBody() {
      const weight = document.getElementById("bodyWeight").value;
      const fat = document.getElementById("bodyFat").value;

      if (!weight) {
        alert("体重を入力してください");
        return;
      }

      const today = new Date();
      const label = `${today.getMonth() + 1}/${today.getDate()}`;

      appData.bodyLog.push({
        date: label,
        weight: Number(weight),
        fat: fat ? Number(fat) : ""
      });

      if (appData.bodyLog.length > 10) {
        appData.bodyLog = appData.bodyLog.slice(-10);
      }

      saveData();
      renderBodyLog();

      document.getElementById("bodyWeight").value = "";
      document.getElementById("bodyFat").value = "";
    }

    function renderBodyLog() {
      const area = document.getElementById("bodyLogArea");

      if (!appData.bodyLog.length) {
        area.textContent = "まだ記録がありません";
        return;
      }

      area.innerHTML = appData.bodyLog.slice().reverse().map(item => {
        return `・${item.date}　${item.weight}kg${item.fat !== "" ? ` / 体脂肪 ${item.fat}%` : ""}`;
      }).join("<br>");
    }

    function resetToday() {
      const ok = confirm("今日の食事記録をすべて削除しますか？");
      if (!ok) return;
      appData.meals = [];
      saveData();
      renderMeals();
    }

    loadData();
  </script>
</body>
</html>
