*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:linear-gradient(180deg,#f0f5f2,#e8ede9);min-height:100vh;min-height:100dvh}
input,select,button{font-family:'Noto Sans JP',sans-serif;touch-action:manipulation}
button{cursor:pointer;-webkit-appearance:none}
.app{max-width:440px;margin:0 auto;padding:20px 16px 90px}
.shell{min-height:100vh;min-height:100dvh;display:flex;justify-content:center;background:linear-gradient(180deg,#f0f5f2,#e8ede9)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
.progress{display:flex;gap:4px;padding:0 4px;margin-bottom:20px}
.progress div{flex:1;height:4px;border-radius:2px;background:#e0e5e2}
.progress div.active{background:linear-gradient(90deg,#2d8a6e,#3aaf8a)}
.title-icon{font-size:28px;margin-bottom:6px}
.title-h{font-size:20px;font-weight:800;color:#1a2e23;margin:0 0 4px;letter-spacing:-0.5px}
.title-sub{font-size:13px;color:#7a8f82;margin:0}
.label{display:block;font-size:12px;font-weight:700;color:#5a6e62;margin-bottom:6px}
.input{width:100%;padding:14px 16px;border-radius:14px;border:2px solid #e8ece9;font-size:16px;outline:none;background:#f8faf9;box-sizing:border-box}
.input:focus{border-color:#2d8a6e}
.select{width:100%;padding:14px 16px;border-radius:14px;border:2px solid #e8ece9;font-size:16px;outline:none;background:#f8faf9;appearance:auto;box-sizing:border-box}
.btn-primary{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#2d8a6e,#3aaf8a);color:#fff;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 4px 16px #2d8a6e4d;margin-top:8px}
.btn-primary:disabled{background:#ccc;box-shadow:none;cursor:default}
.btn-back{flex:1;padding:14px;border-radius:14px;border:2px solid #e0e5e2;background:#fff;color:#888;font-weight:700;font-size:15px;cursor:pointer}
.btn-next{flex:1;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#2d8a6e,#3aaf8a);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
.btn-next:disabled{background:#ccc;cursor:default}
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 2px 12px #0000000a}
.card-title{font-size:12px;font-weight:800;color:#2d8a6e;margin-bottom:14px}
.gender-btn{flex:1;padding:18px 10px;border-radius:14px;border:2px solid #e8ece9;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px}
.gender-btn.active{border-color:#2d8a6e;background:#edf7f2}
.goal-btn{padding:20px 18px;border-radius:16px;border:2px solid #e8ece9;background:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;width:100%}
.goal-btn.active{border-color:#2d8a6e;background:#edf7f2}
.pace-btn{padding:16px 18px;border-radius:14px;border:2px solid #e8ece9;background:#fff;cursor:pointer;text-align:left;font-size:14px;font-weight:700;width:100%}
.pace-btn.active{border-color:#2d8a6e;background:#edf7f2;color:#2d8a6e}
.split-btn{padding:14px 16px;border-radius:14px;border:2px solid #e8ece9;background:#fff;cursor:pointer;text-align:left;font-size:14px;font-weight:700;display:flex;align-items:center;gap:10px;width:100%}
.split-btn.active{border-color:#2d8a6e;background:#edf7f2;color:#2d8a6e}
.cook-btn{padding:14px 16px;border-radius:14px;border:2px solid #e8ece9;background:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;width:100%}
.cook-btn.active{border-color:#2d8a6e;background:#edf7f2}
.s2-badge{display:inline-block;background:#2d8a6e;color:#fff;padding:4px 12px;border-radius:8px;font-size:10px;font-weight:700;margin-bottom:12px;letter-spacing:1px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:500;box-shadow:0 -2px 12px #0000000d}
.tab-btn{flex:1;background:none;border:none;cursor:pointer;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:1px}
.tab-icon{font-size:20px;transition:opacity 0.2s}
.tab-label{font-size:9px;font-weight:500;color:#999}
.tab-label.active{font-weight:800;color:#2d8a6e}
.tab-dot{width:16px;height:2.5px;border-radius:2px;background:#2d8a6e;margin-top:1px}
.pfc-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;margin-bottom:14px}
.day-btn{flex:0 0 auto;padding:8px 14px;border-radius:10px;border:none;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap}
.day-btn.active{background:#2d8a6e;color:#fff}
.day-btn.inactive{background:#fff;color:#555}
.check-btn{width:34px;height:34px;border-radius:8px;border:2px solid #e8ece9;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}
.meal-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 8px #0000000a}
.item-line{font-size:13px;color:#444;padding-left:8px;border-left:3px solid #2d8a6e40;line-height:1.5;margin-bottom:4px}
.item-src{font-size:11px;color:#2d8a6e;font-weight:700;margin-bottom:4px;padding:3px 8px;background:#edf7f2;border-radius:6px;display:inline-block}
.tip-box{margin-top:6px;font-size:11px;color:#2d8a6e;background:#edf7f2;border-radius:8px;padding:6px 10px}
.water-bar{flex:1;height:24px;border-radius:6px;background:#e8ece9;cursor:pointer;transition:background 0.3s}
.water-bar.filled{background:linear-gradient(180deg,#5bc0de,#3498db)}
.fav-tag{padding:4px 10px;border-radius:8px;border:1px solid #FFE082;background:#FFFDE7;font-size:11px;font-weight:600;color:#E65100;cursor:pointer}
.search-result{width:100%;padding:6px 8px;border-radius:6px;border:none;cursor:pointer;text-align:left;margin-bottom:3px}
.timeline-dot{width:14px;height:14px;border-radius:50%;z-index:1;box-shadow:0 1px 4px #0000001a}
.timeline-line{flex:1;width:2px;background:#e0e5e2}
.goal-header{background:linear-gradient(135deg,#1a2e23,#2d8a6e);border-radius:20px;padding:24px 20px;margin-bottom:16px;color:#fff;text-align:center}
</style>

const dis = (d.dislikedFoods || “”).split(/[,、，]/).map(s => s.trim().toLowerCase()).filter(Boolean);

// ユーザー選択ソースを優先
srcs.forEach(s => {
if (FOOD_DB[s]?.[mt]) {
const items = FOOD_DB[s][mt].filter(ok).map(i => ({ …i, src: s }));

function pickFromSrc(srcItems, tgt) {
if (!srcItems.length) return [];

const sel = [];

// まず高タンパク品を1つ

if (hp.length) { const p = hp[Math.floor(Math.random() * hp.length)]; sel.push(p); rem -= p.kcal; }
// 残りを同じソースから埋める（最大5品）
for (let i = 0; i < 20 && sel.length < 5 && rem > 50; i++) {
const c = sh.filter(x => !sel.find(s => s.name === x.name) && x.kcal <= rem + 80 && x.kcal >= 15);

const p = c[Math.floor(Math.random() * c.length)]; sel.push(p); rem -= p.kcal;
}
// まだ100kcal以上足りなければ「ご飯」で補充
if (rem > 100) {
const rice = Math.round(rem / 235);
if (rice >= 1) {
sel.push({ name: `白米ご飯${rice > 1 ? rice + "杯" : "1杯"}`, kcal: rice * 235, p: rice * 4.0, f: rice * 0.5, c: rice * 53.4, src: sel[0]?.src || “自炊” });
rem -= rice * 235;
}
} else if (rem > 50) {
sel.push({ name: “白米ご飯（小）”, kcal: 118, p: 2.0, f: 0.3, c: 26.7, src: sel[0]?.src || “自炊” });
rem -= 118;
}
return sel;
}

// 1食ごとにランダムにソースを1つ選び、そのソースから組み合わせ
function pickMeal(mt, tgt) {
const byS = poolBySrc(mt);
const srcKeys = Object.keys(byS);
if (!srcKeys.length) return [];
const chosen = srcKeys[Math.floor(Math.random() * srcKeys.length)];
return pickFromSrc(byS[chosen], tgt);
}

const drDays = new Set();
const dpw = DFM[d.drinkAllowFreq] || 0;
if (dpw >= 7) { for (let i = 0; i < 7; i++) drDays.add(i); }
else if (dpw > 0) { [4, 5, 6, 3, 2, 1, 0].slice(0, Math.round(dpw)).forEach(i => drDays.add(i)); }

});
const fmtItems = (items) => {
if (!items.length) return [];
const src = items[0]?.src;
const srcLabel = src && src !== “自炊” ? `📍 ${src}` : src === “自炊” ? “📍 自炊” : “”;

return srcLabel ? [srcLabel, …names] : names;
};

const wp = DAYS.map((day, idx) => {
const bI = pickMeal(“breakfast”, bC), lI = pickMeal(“lunch”, lC), dI = pickMeal(“dinner”, dC);
const meals = {
breakfast: { time: bT, items: fmtItems(bI), …sm(bI), tip: tips[idx % 7] },
lunch: { time: lT, items: fmtItems(lI), …sm(lI), tip: tips[(idx + 1) % 7] },
dinner: { time: dT, items: fmtItems(dI), …sm(dI), tip: tips[(idx + 2) % 7] },
};
if (hasS1) { const s = pickMeal(“snack”, se); meals.snack1 = { time: s1T, items: fmtItems(s), …sm(s), tip: “タンパク質系の間食がおすすめ” }; }
if (hasS2) { const s = pickMeal(“snack”, se); meals.snack2 = { time: s2T, items: fmtItems(s), …sm(s), tip: “ナッツや果物でエネルギー補給” }; }
let alcohol = null, ak = 0;
if (drDays.has(idx) && d.drinkAllowType) {
const dt = DRINK_TYPES.find(t => t.label === d.drinkAllowType);
const amt = parseInt(d.drinkAllowAmount) || 1;
if (dt) { ak = dt.kcal * amt; alcohol = { items: [`${d.drinkAllowType} × ${amt}${dt.unit}`], kcal: ak }; }
}
const tK = Object.values(meals).reduce((s, m) => s + m.kcal, 0) + ak;
const tP = Math.round(Object.values(meals).reduce((s, m) => s + m.p, 0) * 10) / 10;
const tF = Math.round(Object.values(meals).reduce((s, m) => s + m.f, 0) * 10) / 10;
const tC = Math.round(Object.values(meals).reduce((s, m) => s + m.c, 0) * 10) / 10;
return { day, meals, alcohol, totalKcal: tK, totalP: tP, totalF: tF, totalC: tC };
});

return {

generalTips: [
plan.isCut ? “タンパク質をしっかり摂って筋肉キープ” : plan.isBulk ? “炭水化物を恐れずトレーニング前後に” : “バランスの良い食事で体調維持”,

function calc() {
const d = S.d;
const nA=parseFloat(d.age)||0, nH=parseFloat(d.height)||0, nW=parseFloat(d.weight)||0, nBf=parseFloat(d.bodyFat)||0;
const lbm = nW>0&&nBf>0 ? nW*(1-nBf/100) : 0;
const jO = JOBS.find(j=>j.label===d.job);
const fO = FRQ.find(f=>f.label===d.exerciseFreq);
const bMSJ = d.gender&&nA&&nH&&nW ? (d.gender===“male”?10*nW+6.25*nH-5*nA+5:10*nW+6.25*nH-5*nA-161) : 0;
const bKM = lbm>0 ? 370+21.6*lbm : 0;
const bmr = bKM>0 ? Math.round((bMSJ+bKM)/2) : Math.round(bMSJ);
const tdee = bmr&&jO ? Math.round(bmr*(jO.factor+(fO?fO.add:0))) : 0;
return { nA,nH,nW,nBf,lbm,fatM:nW-lbm,bmr,tdee };
}
function curDrinkKcal() {
const dt=DRINK_TYPES.find(t=>t.label===S.d.drinkType);
return dt ? Math.round(dt.kcal*(parseInt(S.d.drinkAmount)||0)*(DFM[S.d.drinkFreq]||0)/7) : 0;
}
function allowDrinkKcal() {
const dt=DRINK_TYPES.find(t=>t.label===S.d.drinkAllowType);
return dt ? Math.round(dt.kcal*(parseInt(S.d.drinkAllowAmount)||0)*(DFM[S.d.drinkAllowFreq]||0)/7) : 0;
}
function genPlan() {
const c = calc();
const d=S.d, tw=parseFloat(d.targetWeight)||c.nW, tbf=parseFloat(d.targetBf)||c.nBf, pace=parseFloat(d.pace)||1;
const wd=Math.abs(tw-c.nW), mo=wd>0?Math.ceil(wd/pace):1;
const iC=d.goal===“cut”, iB=d.goal===“bulk”;
let dc=c.tdee; if(iC) dc=Math.round(c.tdee-(pace*7700/30)); if(iB) dc=Math.round(c.tdee+(pace*7700/30));
dc=Math.max(dc,d.gender===“male”?1400:1200);
let pG,fG;
if(iC){pG=Math.round(c.lbm>0?c.lbm*2.2:c.nW*1.8);fG=Math.round(c.nW*0.8)}
else if(iB){pG=Math.round(c.lbm>0?c.lbm*2.0:c.nW*1.6);fG=Math.round(c.nW*0.9)}
else{pG=Math.round(c.lbm>0?c.lbm*1.6:c.nW*1.2);fG=Math.round(c.nW*0.8)}
const cG=Math.round(Math.max((dc-pG*4-fG*9)/4,50)), aC=pG*4+fG*9+cG*4;
S.plan={currentWeight:c.nW,currentBf:c.nBf,lbm:c.lbm,fatMass:c.fatM,targetWeight:tw,targetBf:tbf,targetLBM:tw*(1-tbf/100),weightDiff:wd,months:mo,pace,tdee:c.tdee,dailyCal:dc,actualCal:aC,proteinG:pG,fatG:fG,carbG:cG,isCut:iC,isBulk:iB,bmr:c.bmr};
S.step=5; save(); render();
}

S.selDay=0; S.step=10; S.tab=“today”; save(); render();

}
function addBodyLog() {
const bw = parseFloat(document.getElementById(‘bw-input’)?.value);
const bf = parseFloat(document.getElementById(‘bf-input’)?.value);
if (!bw) return;
S.bodyLog.push({ date: (new Date().getMonth()+1)+’/’+(new Date().getDate()), w: bw, bf: bf||0 });
if (S.bodyLog.length > 12) S.bodyLog = S.bodyLog.slice(-12);
save(); render();
}
function setGoalActual(idx, val) {
if (!S.log.goalActuals) S.log.goalActuals = {};
S.log.goalActuals[idx] = val;
save(); render();
}
function completeMeal(todayIdx) {
const p = S.plan; const tLog = S.log[todayIdx]||{}; const tEaten = tLog.eaten||{};
const allE=[]; MO.forEach(k=>{(tEaten[k]||[]).forEach(e=>allE.push(e))});
const eK=allE.reduce((s,e)=>s+(e.kcal||0),0);
const eP=allE.reduce((s,e)=>s+(e.p||0),0);
const eF=allE.reduce((s,e)=>s+(e.f||0),0);
const tgtK=p?.dailyCal||2000;
const msgs=[];
const kDiff=eK-tgtK;
if(Math.abs(kDiff)<=tgtK*0.05) msgs.push(‘🎉 カロリーほぼピッタリ！素晴らしい。’);
else if(kDiff>0) msgs.push(‘⚡ 目標より’+kDiff+‘kcal多め。明日は間食を控えめに。’);
else msgs.push(‘📉 目標より’+Math.abs(kDiff)+‘kcal少なめ。’+(p.isCut?‘減量中なのでOK！’:‘もう少し食べてOK。’));
const pDiff=eP-(p?.proteinG||0);
if(pDiff<-10) msgs.push(‘💪 タンパク質が’+Math.abs(Math.round(pDiff))+‘g不足。明日はゆで卵やチキンをプラス。’);
else if(pDiff>=0) msgs.push(‘✅ タンパク質は目標達成！’);
if(eF-(p?.fatG||0)>15) msgs.push(‘🫒 脂質が多め。揚げ物を蒸し・焼きに変えてみましょう。’);
const warns=allE.filter(e=>e.warn);
if(warns.length>0) msgs.push(‘⚠️ お菓子/スイーツを’+warns.length+‘品摂りました。代わりにプロテインバーやナッツを。’);
const drinks=allE.filter(e=>e.drink);
if(drinks.length>0){const dk=drinks.reduce((s,e)=>s+e.kcal,0);msgs.push(‘🍺 お酒で’+dk+‘kcal。ハイボールや焼酎に切り替えると◎’);}
S.dailyDone[todayIdx] = msgs;
save(); render();
}
function undoComplete(todayIdx) {
delete S.dailyDone[todayIdx];
save(); render();
}

// ═══ Init ═══
load();
render();

</script>
