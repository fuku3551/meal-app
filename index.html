<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="食事管理" />
  <title>食事管理アプリ</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      background: linear-gradient(180deg, #f0f5f2, #e8ede9);
      min-height: 100vh;
      min-height: 100dvh;
      color: #1a2e23;
    }
    input, select, button, textarea {
      font-family: "Noto Sans JP", sans-serif;
      touch-action: manipulation;
    }
    button {
      cursor: pointer;
      -webkit-appearance: none;
    }
    .shell {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      background: linear-gradient(180deg, #f0f5f2, #e8ede9);
    }
    .app {
      width: 100%;
      max-width: 440px;
      padding: 20px 16px 94px;
    }

    .progress {
      display: flex;
      gap: 4px;
      padding: 0 4px;
      margin-bottom: 20px;
    }
    .progress div {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #e0e5e2;
    }
    .progress div.active {
      background: linear-gradient(90deg, #2d8a6e, #3aaf8a);
    }

    .title-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }
    .title-h {
      font-size: 20px;
      font-weight: 800;
      color: #1a2e23;
      margin: 0 0 4px;
      letter-spacing: -0.4px;
    }
    .title-sub {
      font-size: 13px;
      color: #7a8f82;
      margin: 0;
    }
    .label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #5a6e62;
      margin-bottom: 6px;
    }
    .input, .select, .textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid #e8ece9;
      font-size: 16px;
      outline: none;
      background: #f8faf9;
      box-sizing: border-box;
    }
    .textarea {
      min-height: 92px;
      resize: vertical;
    }
    .input:focus, .select:focus, .textarea:focus {
      border-color: #2d8a6e;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #2d8a6e, #3aaf8a);
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 4px 16px rgba(45, 138, 110, 0.28);
      margin-top: 8px;
    }
    .btn-primary:disabled {
      background: #ccc;
      box-shadow: none;
      cursor: default;
    }
    .btn-back {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #e0e5e2;
      background: #fff;
      color: #888;
      font-weight: 700;
      font-size: 15px;
    }
    .btn-next {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #2d8a6e, #3aaf8a);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
    }
    .btn-next:disabled {
      background: #ccc;
      cursor: default;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }
    .card-title {
      font-size: 12px;
      font-weight: 800;
      color: #2d8a6e;
      margin-bottom: 14px;
    }

    .gender-btn, .goal-btn, .pace-btn, .split-btn, .cook-btn, .seg-btn {
      width: 100%;
      border-radius: 14px;
      border: 2px solid #e8ece9;
      background: #fff;
    }
    .gender-btn {
      flex: 1;
      padding: 18px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .gender-btn.active,
    .goal-btn.active,
    .pace-btn.active,
    .split-btn.active,
    .cook-btn.active,
    .seg-btn.active {
      border-color: #2d8a6e;
      background: #edf7f2;
    }
    .goal-btn {
      padding: 20px 18px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .pace-btn {
      padding: 16px 18px;
      text-align: left;
      font-size: 14px;
      font-weight: 700;
    }
    .split-btn {
      padding: 14px 16px;
      text-align: left;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cook-btn {
      padding: 14px 16px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .s2-badge {
      display: inline-block;
      background: #2d8a6e;
      color: #fff;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-around;
      padding: 6px 0;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      z-index: 500;
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.05);
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 4px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .tab-icon {
      font-size: 20px;
      transition: opacity 0.2s;
    }
    .tab-label {
      font-size: 9px;
      font-weight: 500;
      color: #999;
    }
    .tab-label.active {
      font-weight: 800;
      color: #2d8a6e;
    }
    .tab-dot {
      width: 16px;
      height: 2.5px;
      border-radius: 2px;
      background: #2d8a6e;
      margin-top: 1px;
    }

    .day-btn {
      flex: 0 0 auto;
      padding: 8px 14px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }
    .day-btn.active {
      background: #2d8a6e;
      color: #fff;
    }
    .day-btn.inactive {
      background: #fff;
      color: #555;
    }

    .meal-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
    }
    .item-line {
      font-size: 13px;
      color: #444;
      padding-left: 8px;
      border-left: 3px solid rgba(45, 138, 110, 0.25);
      line-height: 1.5;
      margin-bottom: 4px;
    }
    .item-src {
      font-size: 11px;
      color: #2d8a6e;
      font-weight: 700;
      margin-bottom: 4px;
      padding: 3px 8px;
      background: #edf7f2;
      border-radius: 6px;
      display: inline-block;
    }
    .tip-box {
      margin-top: 6px;
      font-size: 11px;
      color: #2d8a6e;
      background: #edf7f2;
      border-radius: 8px;
      padding: 6px 10px;
    }
    .announce {
      background: linear-gradient(135deg, #edf7f2, #e3f1ec);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid #d7e9df;
    }
    .announce-warn {
      background: #fff8e6;
      border: 1px solid #ffe2a8;
    }
    .announce-title {
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #2d8a6e;
    }
    .announce-warn .announce-title {
      color: #c27b00;
    }
    .announce-text {
      font-size: 12px;
      color: #486353;
      line-height: 1.65;
    }
    .announce-warn .announce-text {
      color: #7a5c1c;
    }

    .water-bar {
      flex: 1;
      height: 24px;
      border-radius: 6px;
      background: #e8ece9;
      cursor: pointer;
      transition: background 0.3s;
    }
    .water-bar.filled {
      background: linear-gradient(180deg, #5bc0de, #3498db);
    }

    .fav-tag {
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid #ffe082;
      background: #fffde7;
      font-size: 11px;
      font-weight: 600;
      color: #e65100;
    }

    .search-wrap {
      min-height: 0;
    }
    .search-result {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: none;
      text-align: left;
      margin-bottom: 3px;
    }

    .goal-header {
      background: linear-gradient(135deg, #1a2e23, #2d8a6e);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 16px;
      color: #fff;
      text-align: center;
    }

    .timeline-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      z-index: 1;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }
    .timeline-line {
      flex: 1;
      width: 2px;
      background: #e0e5e2;
    }

    .seg-wrap {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      margin-bottom: 10px;
    }
    .seg-btn {
      flex: 0 0 auto;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
    }

    .mini-note {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
    }

    .success-box {
      background: linear-gradient(135deg, #edf7f2, #e3f1ec);
      border-radius: 16px;
      padding: 16px;
      margin-top: 12px;
      margin-bottom: 8px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

    function calc() {
      const d = S.d;
      const nA = parseFloat(d.age) || 0;
      const nH = parseFloat(d.height) || 0;
      const nW = parseFloat(d.weight) || 0;
      const nBf = parseFloat(d.bodyFat) || 0;
      const lbm = nW > 0 && nBf > 0 ? nW * (1 - nBf / 100) : 0;
      const fatM = nW - lbm;
      const jO = JOBS.find(j => j.label === d.job);
      const fO = FRQ.find(f => f.label === d.exerciseFreq);

      const bMSJ = d.gender && nA && nH && nW
        ? (d.gender === "male"
          ? 10 * nW + 6.25 * nH - 5 * nA + 5
          : 10 * nW + 6.25 * nH - 5 * nA - 161)
        : 0;

      const bKM = lbm > 0 ? 370 + 21.6 * lbm : 0;
      const bmr = bKM > 0 ? Math.round((bMSJ + bKM) / 2) : Math.round(bMSJ);
      const tdee = bmr && jO ? Math.round(bmr * (jO.factor + (fO ? fO.add : 0))) : 0;

      return { nA, nH, nW, nBf, lbm, fatM, bmr, tdee };
    }

    function currentDrinkDailyKcal() {
      const dt = DRINK_TYPES.find(t => t.label === S.d.drinkType);
      return dt ? Math.round(dt.kcal * (parseInt(S.d.drinkAmount) || 0) * (DFM[S.d.drinkFreq] || 0) / 7) : 0;
    }

    function allowDrinkDailyKcal() {
      const dt = DRINK_TYPES.find(t => t.label === S.d.drinkAllowType);
      return dt ? Math.round(dt.kcal * (parseInt(S.d.drinkAllowAmount) || 0) * (DFM[S.d.drinkAllowFreq] || 0) / 7) : 0;
    }

    function genPlan() {
      const c = calc();
      const d = S.d;

      const tw = parseFloat(d.targetWeight) || c.nW;
      const tbf = parseFloat(d.targetBf) || c.nBf;
      const pace = parseFloat(d.pace) || 1;
      const wd = Math.abs(tw - c.nW);
      const mo = wd > 0 ? Math.ceil(wd / pace) : 1;
      const isCut = d.goal === "cut";
      const isBulk = d.goal === "bulk";

      let dc = c.tdee;
      if (isCut) dc = Math.round(c.tdee - (pace * 7700 / 30));
      if (isBulk) dc = Math.round(c.tdee + (pace * 7700 / 30));
      dc = Math.max(dc, d.gender === "male" ? 1400 : 1200);

      let pG, fG;
      if (isCut) {
        pG = Math.round(c.lbm > 0 ? c.lbm * 2.2 : c.nW * 1.8);
        fG = Math.round(c.nW * 0.8);
      } else if (isBulk) {
        pG = Math.round(c.lbm > 0 ? c.lbm * 2.0 : c.nW * 1.6);
        fG = Math.round(c.nW * 0.9);
      } else {
        pG = Math.round(c.lbm > 0 ? c.lbm * 1.6 : c.nW * 1.2);
        fG = Math.round(c.nW * 0.8);
      }

      const cG = Math.round(Math.max((dc - pG * 4 - fG * 9) / 4, 50));
      const actualCal = pG * 4 + fG * 9 + cG * 4;

      S.plan = {
        currentWeight: c.nW,
        currentBf: c.nBf,
        lbm: c.lbm,
        fatMass: c.fatM,
        targetWeight: tw,
        targetBf: tbf,
        targetLBM: tw * (1 - tbf / 100),
        weightDiff: wd,
        months: mo,
        pace,
        tdee: c.tdee,
        dailyCal: dc,
        actualCal,
        proteinG: pG,
        fatG: fG,
        carbG: cG,
        isCut,
        isBulk,
        bmr: c.bmr
      };

      S.step = 5;
      save();
      render();
    }

    function genMealLocal(plan, d, alDK) {
      const foodCal = plan.dailyCal - alDK;
      const srcs = [];

      if (d.canCook === "yes" || d.canCook === "some") srcs.push("自炊");
      [d.conv1, d.conv2].filter(s => s && s !== "使わない" && FOOD_DB[s]).forEach(s => srcs.push(s));
      [d.restaurant1, d.restaurant2].filter(Boolean).forEach(r => { if (FOOD_DB[r]) srcs.push(r); });
      if (srcs.length === 0) srcs.push("セブンイレブン");

      const dis = (d.dislikedFoods || "")
        .split(/[,、，]/)
        .map(s => s.trim().toLowerCase())
        .filter(Boolean);

      const ok = item => !dis.some(x => item.name.toLowerCase().includes(x));

      function poolBySrc(mt) {
        const byS = {};
        srcs.forEach(s => {
          if (FOOD_DB[s]?.[mt]) {
            const items = FOOD_DB[s][mt].filter(ok).map(i => ({ ...i, src: s }));
            if (items.length) byS[s] = items;
          }
        });
        ["セブンイレブン", "ファミリーマート", "ローソン"].forEach(s => {
          if (!byS[s] && FOOD_DB[s]?.[mt]) {
            const items = FOOD_DB[s][mt].filter(ok).map(i => ({ ...i, src: s }));
            if (items.length) byS[s] = items;
          }
        });
        return byS;
      }

      const hasS1 = d.mealSplit !== "3meals";
      const hasS2 = d.mealSplit === "3meals2snack";
      const sn = (hasS1 ? 1 : 0) + (hasS2 ? 1 : 0);
      const se = sn > 0 ? Math.round(foodCal * 0.08) : 0;
      const mc = foodCal - se * sn;

      const bC = Math.round(mc * 0.28);
      const lC = Math.round(mc * 0.40);
      const dC = mc - bC - lC;

      const w = parseInt(d.wakeTime) || 7;
      const sl = parseInt(d.sleepTime) || 23;

      const bT = `${String(w + 1).padStart(2, "0")}:00`;
      const lT = `${String(Math.max(w + 5, 12)).padStart(2, "0")}:00`;
      const dT = `${String(Math.min(sl - 2, 20)).padStart(2, "0")}:00`;
      const s1T = `${String(Math.max(w + 3, 10)).padStart(2, "0")}:00`;
      const s2T = `${String(Math.round((parseInt(lT) + parseInt(dT)) / 2)).padStart(2, "0")}:00`;

      const tips = [
        "野菜→タンパク質→炭水化物の順で",
        "よく噛んでゆっくり食べましょう",
        "食前にコップ1杯の水を",
        "タンパク質は毎食バランスよく",
        "食物繊維を先に食べると血糖値◎",
        "夜は炭水化物控えめに",
        "間食はタンパク質系がおすすめ"
      ];

      function pickFromSrc(srcItems, tgt) {
        if (!srcItems.length) return [];
        const sh = [...srcItems].sort(() => Math.random() - 0.5);
        const sel = [];
        let rem = tgt;

        const hp = sh.filter(i => i.p >= 10 && i.kcal <= rem + 100);
        if (hp.length) {
          const p = hp[Math.floor(Math.random() * hp.length)];
          sel.push(p);
          rem -= p.kcal;
        }

        for (let i = 0; i < 20 && sel.length < 5 && rem > 50; i++) {
          const cands = sh.filter(x => !sel.find(s => s.name === x.name) && x.kcal <= rem + 80 && x.kcal >= 15);
          if (!cands.length) break;
          const picked = cands[Math.floor(Math.random() * cands.length)];
          sel.push(picked);
          rem -= picked.kcal;
        }

        if (rem > 100) {
          const rice = Math.round(rem / 235);
          if (rice >= 1) {
            sel.push({
              name: `白米ご飯${rice > 1 ? rice + "杯" : "1杯"}`,
              kcal: rice * 235,
              p: rice * 4.0,
              f: rice * 0.5,
              c: rice * 53.4,
              src: sel[0]?.src || "自炊"
            });
          }
        } else if (rem > 50) {
          sel.push({
            name: "白米ご飯（小）",
            kcal: 118,
            p: 2.0,
            f: 0.3,
            c: 26.7,
            src: sel[0]?.src || "自炊"
          });
        }
        return sel;
      }

      function pickMeal(mt, tgt) {
        const byS = poolBySrc(mt);
        const srcKeys = Object.keys(byS);
        if (!srcKeys.length) return [];
        const chosen = srcKeys[Math.floor(Math.random() * srcKeys.length)];
        return pickFromSrc(byS[chosen], tgt);
      }

      const drDays = new Set();
      const dpw = DFM[d.drinkAllowFreq] || 0;
      if (dpw >= 7) {
        for (let i = 0; i < 7; i++) drDays.add(i);
      } else if (dpw > 0) {
        [4, 5, 6, 3, 2, 1, 0].slice(0, Math.round(dpw)).forEach(i => drDays.add(i));
      }

      const DAYS = ["月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日", "日曜日"];

      const sumMeal = items => ({
        kcal: items.reduce((s, i) => s + i.kcal, 0),
        p: Math.round(items.reduce((s, i) => s + i.p, 0) * 10) / 10,
        f: Math.round(items.reduce((s, i) => s + i.f, 0) * 10) / 10,
        c: Math.round(items.reduce((s, i) => s + i.c, 0) * 10) / 10
      });

      const fmtItems = items => {
        if (!items.length) return [];
        const src = items[0]?.src;
        const srcLabel = src && src !== "自炊" ? `📍 ${src}` : src === "自炊" ? "📍 自炊" : "";
        const names = items.map(i => i.name);
        return srcLabel ? [srcLabel, ...names] : names;
      };

      const weeklyPlan = DAYS.map((day, idx) => {
        const bI = pickMeal("breakfast", bC);
        const lI = pickMeal("lunch", lC);
        const dI = pickMeal("dinner", dC);

        const meals = {
          breakfast: { time: bT, items: fmtItems(bI), ...sumMeal(bI), tip: tips[idx % 7] },
          lunch: { time: lT, items: fmtItems(lI), ...sumMeal(lI), tip: tips[(idx + 1) % 7] },
          dinner: { time: dT, items: fmtItems(dI), ...sumMeal(dI), tip: tips[(idx + 2) % 7] }
        };

        if (hasS1) {
          const s = pickMeal("snack", se);
          meals.snack1 = {
            time: s1T,
            items: fmtItems(s),
            ...sumMeal(s),
            tip: "タンパク質系の間食がおすすめ"
          };
        }

        if (hasS2) {
          const s = pickMeal("snack", se);
          meals.snack2 = {
            time: s2T,
            items: fmtItems(s),
            ...sumMeal(s),
            tip: "ナッツや果物でエネルギー補給"
          };
        }

        let alcohol = null;
        let ak = 0;
        if (drDays.has(idx) && d.drinkAllowType) {
          const dt = DRINK_TYPES.find(t => t.label === d.drinkAllowType);
          const amt = parseInt(d.drinkAllowAmount) || 1;
          if (dt) {
            ak = dt.kcal * amt;
            alcohol = {
              items: [`${d.drinkAllowType} × ${amt}${dt.unit}`],
              kcal: ak
            };
          }
        }

        const totalKcal = Object.values(meals).reduce((s, m) => s + m.kcal, 0) + ak;
        const totalP = Math.round(Object.values(meals).reduce((s, m) => s + m.p, 0) * 10) / 10;
        const totalF = Math.round(Object.values(meals).reduce((s, m) => s + m.f, 0) * 10) / 10;
        const totalC = Math.round(Object.values(meals).reduce((s, m) => s + m.c, 0) * 10) / 10;

        return { day, meals, alcohol, totalKcal, totalP, totalF, totalC };
      });

      return {
        weeklyPlan,
        generalTips: [
          plan.isCut
            ? "タンパク質をしっかり摂って筋肉キープ"
            : plan.isBulk
              ? "炭水化物を恐れずトレーニング前後に"
              : "バランスの良い食事で体調維持",
          "水分は1日2L以上。代謝アップに効果的",
          "食べる順番は「野菜→タンパク質→炭水化物」"
        ],
        alcoholAdvice:
          (DFM[d.drinkAllowFreq] || 0) > 0 && d.drinkAllowType
            ? `お酒は週${Math.round(DFM[d.drinkAllowFreq] || 0)}回程度に。ハイボールや焼酎は糖質少なめでおすすめ。おつまみは枝豆・刺身・サラダなど高タンパクなものを。`
            : "禁酒で目標達成を加速！全カロリーを栄養ある食事に使えます。"
      };
    }

    function genMeal() {
      S.meal = genMealLocal(S.plan, S.d, allowDrinkDailyKcal());
      S.selDay = 0;
      S.step = 10;
      S.tab = "today";

      Object.entries(FOOD_DB).forEach(([src, cats]) => {
        Object.values(cats).forEach(items => {

    function goalCommentFor(expectedW, actualW, isCut) {
      if (actualW === "" || actualW === undefined || actualW === null || Number.isNaN(parseFloat(actualW))) {
        return null;
      }

      const actual = parseFloat(actualW);
      const diff = Math.round((actual - expectedW) * 10) / 10;

      if (isCut) {
        if (diff <= -0.3) {
          return {
            result: "素晴らしいです。今月の目標を上回る進捗です。",
            next: "来月も無理しすぎず、この良い流れをキープしていきましょう。"
          };
        }
        if (diff <= 0.3) {
          return {
            result: "とても順調です。今月の目標にかなり近いです。",
            next: "来月もこの調子で、1日1日の積み重ねを大切にしていきましょう。"
          };
        }
        if (diff <= 1.0) {
          return {
            result: "あと一歩でしたが、しっかり継続できています。",
            next: "来月は間食や夜の炭水化物を少し意識すると、さらに近づけます。"
          };
        }
        return {
          result: "今月は調整期間だったと考えて大丈夫です。",
          next: "記録を続けていること自体が強みです。来月も焦らず頑張りましょう。"
        };
      } else {
        if (diff >= 0.3) {
          return {
            result: "素晴らしいです。目標を上回る増量ペースです。",
            next: "来月も体調を見ながら、良い食事習慣を続けていきましょう。"
          };
        }
        if (diff >= -0.3) {
          return {
            result: "順調です。今月の目標にかなり近い進捗です。",
            next: "来月もタンパク質と食事回数を意識して積み上げていきましょう。"
          };
        }
        if (diff >= -1.0) {
          return {
            result: "あと少しで目標でした。十分前進しています。",
            next: "来月は食事量や間食を少し増やすと、さらに伸ばしやすくなります。"
          };
        }
        return {
          result: "今月は土台作りの月だったと考えてOKです。",
          next: "焦らず、まずは食事記録と継続を大切にして来月も頑張りましょう。"
        };
      }
    }

    function getTodaySummary() {
      const todayIdx = getTodayIndex();
      const todayLog = S.log[todayIdx] || {};
      const todayEaten = todayLog.eaten || {};
      const todayPlan = S.meal?.weeklyPlan?.[todayIdx];

      const catKeys = MEAL_KEYS.filter(k => todayPlan?.meals?.[k]);
      const allEaten = [];
      catKeys.forEach(k => {
        (todayEaten[k] || []).forEach(e => allEaten.push(e));
      });

      const eK = allEaten.reduce((s, e) => s + (e.kcal || 0), 0);
      const eP = Math.round(allEaten.reduce((s, e) => s + (e.p || 0), 0) * 10) / 10;
      const eF = Math.round(allEaten.reduce((s, e) => s + (e.f || 0), 0) * 10) / 10;
      const eC = Math.round(allEaten.reduce((s, e) => s + (e.c || 0), 0) * 10) / 10;
      const tgtK = S.plan?.dailyCal || 2000;
      const pct = Math.min(Math.round(eK / tgtK * 100), 150);

      return { todayIdx, todayLog, todayEaten, todayPlan, catKeys, allEaten, eK, eP, eF, eC, tgtK, pct };
    }

    function generateDailyFeedback() {
      const { allEaten, eK, eP, eF, eC, tgtK } = getTodaySummary();
      const p = S.plan;
      const msgs = [];
      const kDiff = eK - tgtK;
      const pDiff = eP - (p?.proteinG || 0);
      const fDiff = eF - (p?.fatG || 0);
      const cDiff = eC - (p?.carbG || 0);

      if (Math.abs(kDiff) <= tgtK * 0.05) {
        msgs.push("今日のカロリーはほぼ理想的です。とても上手にコントロールできています。");
      } else if (kDiff > 0) {
        msgs.push(`今日は目標より${kDiff}kcalほど多めでした。明日は間食か夜ご飯を少し軽めにすると整えやすいです。`);
      } else {
        msgs.push(`今日は目標より${Math.abs(kDiff)}kcalほど少なめでした。${p?.isCut ? "減量中なら大きな問題はありませんが、極端な食べなさすぎには注意です。" : "もう少し食べても大丈夫です。特にタンパク質を意識してみましょう。"}`);
      }

      if (pDiff < -10) {
        msgs.push(`タンパク質は${Math.abs(Math.round(pDiff))}gほど不足気味です。ゆで卵・サラダチキン・プロテインを足すと改善しやすいです。`);
      } else if (pDiff >= 0) {
        msgs.push("タンパク質はしっかり摂れています。筋肉維持や体づくりに良い流れです。");
      }

      if (fDiff > 15) msgs.push("脂質は少し多めでした。揚げ物より焼き・蒸しを選ぶとさらに安定しやすいです。");
      if (cDiff > 30) msgs.push("炭水化物はやや多めでした。明日は夜のご飯量を少し調整すると整いやすいです。");

      const warns = allEaten.filter(e => e.warn);
      if (warns.length > 0) msgs.push(`お菓子やスイーツを${warns.length}品とっています。次回はナッツやプロテイン系に置き換えるのもおすすめです。`);

      const drinks = allEaten.filter(e => e.drink);
      if (drinks.length > 0) {
        const dk = drinks.reduce((s, e) => s + e.kcal, 0);
        msgs.push(`お酒は合計${dk}kcalでした。ハイボールや焼酎系にすると抑えやすいです。`);
      }

      let motivation = "";
      if (p?.isCut) {
        motivation = "明日も完璧を目指すより、今日より少し整える気持ちでいきましょう。継続が一番強いです。";
      } else if (p?.isBulk) {
        motivation = "明日も食事回数とタンパク質を意識して、着実に積み上げていきましょう。";
      } else {
        motivation = "明日も無理なく、安定した食事リズムを続けていきましょう。";
      }

      return {
        title: "お疲れ様です☺️",
        summary: msgs,
        motivation
      };
    }

    function completeTodayMeals() {
      const { todayIdx, allEaten } = getTodaySummary();
      if (!allEaten.length) return;
      S.dailyDone[todayIdx] = generateDailyFeedback();
      save();
      render();
    }

    function undoComplete(todayIdx) {
      delete S.dailyDone[todayIdx];
      save();
      render();
    }

    function removeTodayItem(todayIdx, cat, idx) {
      if (!S.log[todayIdx]?.eaten?.[cat]) return;
      const arr = [...S.log[todayIdx].eaten[cat]];
      arr.splice(idx, 1);
      S.log[todayIdx].eaten[cat] = arr;
      save();
      render();
    }

    function setWater(val) {
      S.water[getTodayKey()] = val;
      save();
      render();
    }

    function setCheck(day, meal, sym) {
      if (!S.log[day]) S.log[day] = {};
      if (!S.log[day].checks) S.log[day].checks = {};
      S.log[day].checks[meal] = sym;
      save();
      render();
    }

    function addBodyLog() {
      const bw = parseFloat(document.getElementById("bw-input")?.value);
      const bf = parseFloat(document.getElementById("bf-input")?.value);
      if (!bw) return;

      S.bodyLog.push({
        date: `${new Date().getMonth() + 1}/${new Date().getDate()}`,
        w: bw,
        bf: bf || 0
      });

      if (S.bodyLog.length > 20) S.bodyLog = S.bodyLog.slice(-20);
      save();
      render();
    }

    function openAddFood(cat) {
      S.addMode = true;
      S.addCat = cat;
      S.foodSearch = "";
      S.searchScrollTop = 0;
      S.addTime = "";
      S.customName = "";
      S.customKcal = "";
      S.customP = "";
      S.customF = "";
      S.customC = "";
      render();
      setTimeout(() => {
        const el = document.getElementById("food-search-input");
        if (el) el.focus();
      }, 0);
    }

    function closeAddFood() {
      S.addMode = false;
      S.addCat = "";
      S.foodSearch = "";
      S.searchScrollTop = 0;
      render();
    }

    function addFoodItem(cat, item) {
      const todayIdx = getTodayIndex();
      if (!S.log[todayIdx]) S.log[todayIdx] = {};
      if (!S.log[todayIdx].eaten) S.log[todayIdx].eaten = {};
      if (!S.log[todayIdx].eaten[cat]) S.log[todayIdx].eaten[cat] = [];
      S.log[todayIdx].eaten[cat].push(item);

      S.addMode = false;
      S.addCat = "";
      S.foodSearch = "";
      S.searchScrollTop = 0;
      save();
      render();
    }

    function updateSearch(v) {
      S.foodSearch = v;
      const resultsEl = document.getElementById("search-results");
      if (resultsEl) S.searchScrollTop = resultsEl.scrollTop || 0;
      renderSearchResultsOnly();
    }

    function renderSearchResultsOnly() {
      const resultsEl = document.getElementById("search-results");
      if (!resultsEl) return;
      resultsEl.innerHTML = renderSearchResults();
      resultsEl.scrollTop = S.searchScrollTop || 0;
    }

    function renderSearchResults() {
      const q = (S.foodSearch || "").trim().toLowerCase();
      if (!q) return "";

      const allFoods = getAllFoods();
      const results = allFoods
        .filter(f =>
          f.name.toLowerCase().includes(q) ||
          (f.cat || "").toLowerCase().includes(q) ||
          (f.src || "").toLowerCase().includes(q)
        )
        .slice(0, 30);

      let h = "";
      results.forEach((f, i) => {
        const isW = (f.cat || f.src || "").includes("🚨");
        const isD = (f.cat || "").includes("🍺");
        const bg = isW ? "#FFF5F5" : isD ? "#FFF8E1" : "#fff";
        const tc = isW ? "#c0392b" : isD ? "#E65100" : "#333";
        const isFav = S.favorites.some(x => x.name === f.name);

        h += `
          <div style="display:flex;gap:4px;margin-bottom:3px">
            <button class="search-result" style="background:${bg}" onclick="pickFood(${i})">
              <div style="font-size:12px;color:${tc};font-weight:600">${esc(f.name)}</div>
              <div style="font-size:9px;color:#999">${f.kcal}kcal P:${f.p}g F:${f.f}g C:${f.c}g</div>
            </button>
            <button
              style="width:30px;border-radius:6px;border:none;background:transparent;font-size:16px;color:${isFav ? "#f39c12" : "#ddd"}"
              onclick="toggleFavFromSearch(${i})"
            >${isFav ? "★" : "☆"}</button>
          </div>
        `;
      });

      if (!results.length) {
        h = `<div style="font-size:11px;color:#999;padding:6px 2px">該当する食品が見つかりませんでした</div>`;
      }

      return h;
    }

    function getSearchResultsArray() {
      const q = (S.foodSearch || "").trim().toLowerCase();
      if (!q) return [];
      return getAllFoods()
        .filter(f =>
          f.name.toLowerCase().includes(q) ||
          (f.cat || "").toLowerCase().includes(q) ||
          (f.src || "").toLowerCase().includes(q)
        )
        .slice(0, 30);
    }

    function pickFood(idx) {
      const f = getSearchResultsArray()[idx];
      if (!f) return;
      const isW = (f.cat || f.src || "").includes("🚨");
      const isD = (f.cat || "").includes("🍺");
      addFoodItem(S.addCat, {
        name: f.name,
        kcal: f.kcal,
        p: f.p,
        f: f.f,
        c: f.c,
        time: S.addTime,
        warn: isW,
        drink: isD
      });
    }

    function toggleFavFromSearch(idx) {
      const f = getSearchResultsArray()[idx];
      if (!f) return;

      const existing = S.favorites.findIndex(x => x.name === f.name);
      if (existing >= 0) {
        S.favorites.splice(existing, 1);
      } else {
        const isW = (f.cat || f.src || "").includes("🚨");
        const isD = (f.cat || "").includes("🍺");
        S.favorites.push({
          name: f.name,
          kcal: f.kcal,
          p: f.p,
          f: f.f,
          c: f.c,
          warn: isW,
          drink: isD
        });
      }
      save();
      renderSearchResultsOnly();
      render();
    }

    function pickFav(idx) {
      const f = S.favorites[idx];
      if (!f) return;
      addFoodItem(S.addCat, { ...f, time: S.addTime });
    }

    function addCustomFood() {
      const name = S.customName.trim();
      if (!name) return;
      addFoodItem(S.addCat, {
        name,
        kcal: parseFloat(S.customKcal) || 0,
        p: parseFloat(S.customP) || 0,
        f: parseFloat(S.customF) || 0,
        c: parseFloat(S.customC) || 0,
        time: S.addTime
      });
    }

    function progressBar(c, t) {
      return `<div class="progress">${Array.from({ length: t }).map((_, i) => `<div class="${i <= c ? "active" : ""}"></div>`).join("")}</div>`;
    }

    function titleBlock(icon, title, sub) {
      return `

      ];

      return `
        <div class="tab-bar">
          ${tabs.map(t => `
            <button class="tab-btn" onclick="setTab('${t.id}')">
              <span class="tab-icon" style="opacity:${S.tab === t.id ? 1 : 0.4}">${t.icon}</span>
              <span class="tab-label ${S.tab === t.id ? "active" : ""}">${t.label}</span>
              ${S.tab === t.id ? `<div class="tab-dot"></div>` : ""}

        `;
      }

      if (curSegment === "life") {
        h += `

    function renderGoalTab() {
      const p = S.plan;
      const startW = p?.currentWeight || 70;
      const tgtW = p?.targetWeight || startW;
      const months = p?.months || 1;
      const pace = p?.pace || 0;
      const isCut = p?.isCut;
      const now = new Date();
      const goalActual = goalActuals();

      let h = `
        <div class="goal-header">
          <div style="font-size:12px;font-weight:700;opacity:0.7;margin-bottom:6px">🎯 最終目標</div>
          <div style="display:flex;justify-content:center;align-items:baseline;gap:8px;margin-bottom:8px">
            <div>
              <div style="font-size:42px;font-weight:800;line-height:1">${tgtW}</div>
              <div style="font-size:12px;opacity:0.7">kg</div>
            </div>
            <div style="font-size:20px;opacity:0.5">/</div>
            <div>
              <div style="font-size:42px;font-weight:800;line-height:1">${p?.targetBf || "−"}</div>
              <div style="font-size:12px;opacity:0.7">%</div>
            </div>
          </div>
          <div style="display:flex;justify-content:center;gap:16px;font-size:12px;opacity:0.8;flex-wrap:wrap">
            <span>${isCut ? "🔥 減量" : p?.isBulk ? "💪 増量" : "⚖️ 維持"}</span>
            <span>現在 ${startW}kg</span>
            <span>あと ${(p?.weightDiff || 0).toFixed(1)}kg</span>
          </div>
          <div style="display:flex;justify-content:center;gap:12px;margin-top:10px;font-size:11px;opacity:0.7;flex-wrap:wrap">
            <span>📅 約${months}ヶ月</span>
            <span>🔥 ${p?.dailyCal || 0}kcal/日</span>
            <span>P:${p?.proteinG || 0}g</span>
            <span>F:${p?.fatG || 0}g</span>
            <span>C:${p?.carbG || 0}g</span>
          </div>
        </div>

        <div style="font-size:14px;font-weight:800;color:#1a2e23;margin-bottom:10px">📊 月間マイルストーン</div>
      `;

      for (let i = 0; i <= Math.min(months, 12); i++) {
        const mDate = new Date(now.getFullYear(), now.getMonth() + i, 30);
        const expectedW = isCut ? Math.max(startW - pace * i, tgtW) : Math.min(startW + pace * i, tgtW);
        const eW = Math.round(expectedW * 10) / 10;
        const actualVal = goalActual[i];
        const hasActual = actualVal !== undefined && actualVal !== "";
        const diff = hasActual ? (parseFloat(actualVal) - eW) : null;
        const isLast = i === Math.min(months, 12);
        const comment = goalCommentFor(eW, actualVal, isCut);

        h += `
          <div style="display:flex;align-items:stretch">
            <div style="width:40px;display:flex;flex-direction:column;align-items:center;position:relative">
              <div class="timeline-dot" style="background:${isLast ? "#2d8a6e" : hasActual ? "#3aaf8a" : "#c8ddd2"};border:${isLast ? "3px solid #1a2e23" : "2px solid #fff"}"></div>
              ${isLast ? "" : `<div class="timeline-line"></div>`}
            </div>

            <div style="flex:1;background:${isLast ? "#edf7f2" : "#fff"};border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,0.04);border:${isLast ? "2px solid #2d8a6e" : "1px solid #f0f0f0"}">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;flex-wrap:wrap">
                <div>
                  <span style="font-size:13px;font-weight:800;color:${isLast ? "#2d8a6e" : "#1a2e23"}">${mDate.getMonth() + 1}/${mDate.getDate()}</span>
                  ${i === 0 ? `<span style="font-size:9px;color:#888;margin-left:6px">スタート</span>` : ""}
                  ${isLast ? `<span style="font-size:9px;color:#2d8a6e;margin-left:6px;font-weight:700">🏁 ゴール</span>` : ""}
                </div>
                <div style="font-size:12px;color:#888;font-weight:600">目標 ${eW}kg</div>
              </div>

              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <div style="font-size:11px;color:#5a6e62;font-weight:600;white-space:nowrap">実績:</div>
                <input
                  type="number"
                  value="${actualVal ?? ""}"
                  onchange="setGoalActual(${i}, this.value)"
                  placeholder="−"
                  style="width:90px;padding:6px 10px;border-radius:8px;border:1.5px solid #e8ece9;font-size:14px;font-weight:800;outline:none;background:#f8faf9;text-align:center"
                />
                <span style="font-size:12px;color:#888">kg</span>
                ${
                  diff !== null
                    ? `<span style="font-size:11px;font-weight:700;color:${(isCut && diff <= 0) || (!isCut && diff >= 0) ? "#2d8a6e" : "#c0392b"};margin-left:4px">${diff > 0 ? "+" : ""}${diff.toFixed(1)}kg</span>`
                    : ""
                }
              </div>

              ${
                comment
                  ? `
                    <div style="margin-top:10px;background:#f8faf9;border-radius:10px;padding:10px">
                      <div style="font-size:11px;font-weight:800;color:#2d8a6e;margin-bottom:4px">成果コメント</div>

            return `

      if (dd) {

                  </div>
                  ${(m.items || []).map(it => it.startsWith("📍")

                    <span style="color:#e74c3c">P:${m.p}g</span>

        ${mealKeys.map(k => {

      h += `

          <div style="text-align:center;font-size:11px;color:#5a6e62;margin-top:4px;font-weight:600">${pct}%</div>

      catKeys.forEach(k => {
        const m = todayPlan.meals[k];
        const catEaten = todayEaten[k] || [];
        const catKcal = catEaten.reduce((s, e) => s + (e.kcal || 0), 0);

        h += `
          <div class="meal-card">

      h += `
        <div class="meal-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

            <button style="width:36px;height:36px;border-radius:10px;border:none;background:linear-gradient(135deg,#3498db,#5bc0de);font-size:18px;color:#fff" onclick="setWater(Math.min(${cups} + 1, 12))">＋</button>
          </div>

          <div id="search-results" class="search-wrap" style="max-height:220px;overflow-y:auto;margin-bottom:6px">
            ${renderSearchResults()}
          </div>

          <div style="font-size:10px;font-weight:700;color:#5a6e62;margin-bottom:4px">手入力</div>
          <input class="input" style="font-size:12px;padding:8px 10px;margin-bottom:4px" placeholder="品名" value="${esc(S.customName)}" oninput="S.customName=this.value" />
          <div style="display:flex;gap:4px;margin-bottom:6px">
            <input class="input" type="number" style="flex:1;font-size:11px;padding:8px 6px" placeholder="kcal" value="${esc(S.customKcal)}" oninput="S.customKcal=this.value" />
            <input class="input" type="number" style="flex:1;font-size:11px;padding:8px 6px" placeholder="P" value="${esc(S.customP)}" oninput="S.customP=this.value" />
            <input class="input" type="number" style="flex:1;font-size:11px;padding:8px 6px" placeholder="F" value="${esc(S.customF)}" oninput="S.customF=this.value" />
            <input class="input" type="number" style="flex:1;font-size:11px;padding:8px 6px" placeholder="C" value="${esc(S.customC)}" oninput="S.customC=this.value" />
          </div>

          <div style="display:flex;gap:6px">
            <button
              style="flex:1;padding:8px;border-radius:8px;border:1px solid #e0e5e2;background:#fff;color:#888;font-weight:700;font-size:12px"
              onclick="closeAddFood()"
            >閉じる</button>
            <button
              style="flex:1;padding:8px;border-radius:8px;border:none;background:${S.customName.trim() ? "#2d8a6e" : "#ccc"};color:#fff;font-weight:700;font-size:12px"
              onclick="addCustomFood()"
            >追加</button>
          </div>
        </div>
      `;
    }

    function renderStep0() {
      const c = calc();
      const d = S.d;
      const canNext = d.gender && c.nA >= 10 && c.nH >= 100 && c.nW >= 30 && c.nBf > 0;

      return `
        ${progressBar(0, 5)}
        ${titleBlock("📋", "基本情報", "あなたの体の情報を入力してください")}

        <div style="display:flex;flex-direction:column;gap:16px">
          <div>
            <span class="label">性別</span>
            <div style="display:flex;gap:10px">
              <button class="gender-btn ${d.gender === "male" ? "active" : ""}" onclick="updR('gender','male')">
                <span style="font-size:28px">🙋‍♂️</span>
                <span style="font-size:14px;font-weight:700;color:${d.gender === "male" ? "#2d8a6e" : "#888"}">男性</span>
              </button>
              <button class="gender-btn ${d.gender === "female" ? "active" : ""}" onclick="updR('gender','female')">
                <span style="font-size:28px">🙋‍♀️</span>
                <span style="font-size:14px;font-weight:700;color:${d.gender === "female" ? "#2d8a6e" : "#888"}">女性</span>
              </button>
            </div>
          </div>

          <div><span class="label">年齢</span><input class="input" type="number" value="${esc(d.age)}" oninput="upd('age', this.value)" onblur="render()" placeholder="例：35" /></div>
          <div><span class="label">身長（cm）</span><input class="input" type="number" value="${esc(d.height)}" oninput="upd('height', this.value)" onblur="render()" placeholder="例：170" step="0.1" /></div>
          <div><span class="label">体重（kg）</span><input class="input" type="number" value="${esc(d.weight)}" oninput="upd('weight', this.value)" onblur="render()" placeholder="例：75" step="0.1" /></div>
          <div><span class="label">体脂肪率（%）</span><input class="input" type="number" value="${esc(d.bodyFat)}" oninput="upd('bodyFat', this.value)" onblur="render()" placeholder="例：25" step="0.1" /></div>

          ${
            c.nW > 0 && c.nBf > 0
              ? `
                <div style="background:#edf7f2;border-radius:14px;padding:14px 16px;display:flex;gap:12px">
                  <div style="flex:1;text-align:center">
                    <div style="font-size:10px;color:#5a6e62;font-weight:600">除脂肪体重</div>
                    <div style="font-size:20px;font-weight:800;color:#2d8a6e">${c.lbm.toFixed(1)}kg</div>
                  </div>
                  <div style="width:1px;background:#c8ddd2"></div>
                  <div style="flex:1;text-align:center">
                    <div style="font-size:10px;color:#5a6e62;font-weight:600">体脂肪量</div>
                    <div style="font-size:20px;font-weight:800;color:#c0392b">${c.fatM.toFixed(1)}kg</div>
                  </div>
                </div>
              `
              : ""
          }

          <button class="btn-primary" ${canNext ? "" : "disabled"} onclick="setStep(1)">次へ →</button>
        </div>
      `;
    }

    function renderStep1() {
      const c = calc();
      const d = S.d;
      const canNext = d.job && d.exercise && (d.exercise === "なし" || d.exerciseFreq);

      return `
        ${progressBar(1, 5)}
        ${titleBlock("💼", "生活スタイル", "仕事と運動について教えてください")}

        <div style="display:flex;flex-direction:column;gap:16px">
          <div>
            <span class="label">仕事内容</span>
            <select class="select" onchange="updR('job', this.value)">
              <option value="">選択してください</option>
              ${JOBS.map(j => `<option value="${esc(j.label)}" ${d.job === j.label ? "selected" : ""}>${esc(j.label)}</option>`).join("")}
            </select>
          </div>

          <div>
            <span class="label">運動項目</span>
            <select class="select" onchange="updR('exercise', this.value); if (this.value === 'なし') { upd('exerciseFreq', ''); render(); }">
              <option value="">選択してください</option>
              ${EXLIST.map(e => `<option value="${esc(e)}" ${d.exercise === e ? "selected" : ""}>${esc(e)}</option>`).join("")}
            </select>
          </div>

          ${
            d.exercise && d.exercise !== "なし"
              ? `
                <div>
                  <span class="label">運動頻度</span>
                  <select class="select" onchange="updR('exerciseFreq', this.value)">
                    <option value="">選択してください</option>
                    ${FRQ.map(f => `<option value="${esc(f.label)}" ${d.exerciseFreq === f.label ? "selected" : ""}>${esc(f.label)}</option>`).join("")}
                  </select>
                </div>
              `
              : ""
          }

          ${
            c.tdee > 0
              ? `
                <div style="background:linear-gradient(135deg,#edf7f2,#e3f1ec);border-radius:16px;padding:18px 16px;text-align:center">
                  <div style="font-size:11px;color:#5a6e62;font-weight:700;margin-bottom:6px">推定消費カロリー</div>
                  <div style="font-size:36px;font-weight:800;color:#2d8a6e">${c.tdee} <span style="font-size:14px">kcal/日</span></div>
                </div>
              `
              : ""
          }

          ${navBtns("setStep(0)", "setStep(2)", !canNext)}
        </div>
      `;
    }

    function renderStep2() {
      return `
        ${progressBar(2, 5)}
        ${titleBlock("🎯", "目標体型", "どんな体を目指しますか？")}

        <div style="display:flex;flex-direction:column;gap:12px">
          ${GLS.map(g => `
            <button class="goal-btn ${S.d.goal === g.id ? "active" : ""}" onclick="updR('goal', '${g.id}'); upd('targetWeight',''); upd('targetBf',''); upd('pace',''); render();">
              <span style="font-size:32px">${g.icon}</span>
              <div>
                <div style="font-size:16px;font-weight:800;color:${S.d.goal === g.id ? "#2d8a6e" : "#333"}">${g.label}</div>
                <div style="font-size:12px;color:#888">${g.desc}</div>
              </div>
            </button>
          `).join("")}

          ${navBtns("setStep(1)", "setStep(3)", !S.d.goal)}
        </div>
      `;
    }

    function renderStep3() {
      const c = calc();
      const d = S.d;
      const isMaintain = d.goal === "maintain";
      const canNext = isMaintain || (d.targetWeight && d.targetBf);

      return `
        ${progressBar(3, 5)}
        ${titleBlock("📐", "具体的な目標", isMaintain ? "現在の体型をキープ" : "目標の体重・体脂肪率を設定")}

        <div style="display:flex;flex-direction:column;gap:16px">
          ${
            !isMaintain
              ? `
                <div>
                  <span class="label">目標体重（kg）</span>
                  <input class="input" type="number" value="${esc(d.targetWeight)}" oninput="upd('targetWeight', this.value)" onblur="render()" placeholder="${d.goal === "cut" ? `例：${Math.round(c.nW - 5)}` : `例：${Math.round(c.nW + 5)}`}" step="0.1" />
                </div>
                <div>
                  <span class="label">目標体脂肪率（%）</span>
                  <input class="input" type="number" value="${esc(d.targetBf)}" oninput="upd('targetBf', this.value)" onblur="render()" placeholder="例：15" step="0.1" />
                </div>
              `
              : ""
          }

          ${navBtns(
            "setStep(2)",
            isMaintain
              ? `upd('targetWeight','${c.nW}'); upd('targetBf','${c.nBf}'); upd('pace','0'); setStep(4);`
              : "setStep(4)",
            !canNext
          )}
        </div>
      `;
    }

    function renderStep4() {
      const d = S.d;
      if (d.goal === "maintain") {
        genPlan();
        return "";
      }
      const list = d.goal === "cut" ? PCUT : PBULK;

      return `
        ${progressBar(4, 5)}
        ${titleBlock("⏱️", "ペース設定", d.goal === "cut" ? "月にどのくらい減量？" : "月にどのくらい増量？")}

        <div style="display:flex;flex-direction:column;gap:10px">
          ${list.map(p => `
            <button class="pace-btn ${d.pace === String(p.value) ? "active" : ""}" onclick="updR('pace','${p.value}')">${p.label}</button>
          `).join("")}
          ${navBtns("setStep(3)", "genPlan()", !d.pace, "プラン作成 🚀")}
        </div>
      `;
    }

    function renderStep5() {
      const p = S.plan;
      const pP = Math.round(p.proteinG * 4 / p.actualCal * 100);
      const fP = Math.round(p.fatG * 9 / p.actualCal * 100);
      const cP = 100 - pP - fP;

      return `
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:40px;margin-bottom:8px">✅</div>
          <h2 style="font-size:22px;font-weight:800;color:#1a2e23">あなたのプラン</h2>
        </div>

        <div class="card">
          <div class="card-title">📊 体組成の変化</div>
          <div style="display:flex;gap:8px">
            <div style="flex:1;background:#f4f6f5;border-radius:12px;padding:12px;text-align:center">
              <div style="font-size:9px;color:#888">現在</div>
              <div style="font-size:20px;font-weight:800">${p.currentWeight}kg</div>
              <div style="font-size:11px;color:#888">体脂肪${p.currentBf}%</div>
            </div>
            <div style="display:flex;align-items:center;font-size:20px;color:#2d8a6e">→</div>
            <div style="flex:1;background:#edf7f2;border-radius:12px;padding:12px;text-align:center">
              <div style="font-size:9px;color:#2d8a6e">目標</div>
              <div style="font-size:20px;font-weight:800;color:#2d8a6e">${p.targetWeight}kg</div>
              <div style="font-size:11px;color:#5a6e62">体脂肪${p.targetBf}%</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">🔥 1日のカロリー</div>
          <div style="text-align:center">
            <div style="font-size:11px;color:#888">消費 ${p.tdee} kcal → 摂取目標</div>
            <div style="font-size:42px;font-weight:800;color:#1a2e23">${p.dailyCal} <span style="font-size:16px;color:#888">kcal</span></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">🥗 PFCバランス</div>
          <div style="display:flex;height:12px;border-radius:6px;overflow:hidden;margin-bottom:14px">
            <div style="width:${pP}%;background:#e74c3c"></div>
            <div style="width:${fP}%;background:#f39c12"></div>
            <div style="width:${cP}%;background:#2ecc71"></div>
          </div>

          <div style="display:flex;gap:8px">
            ${[
              { l: "タンパク質", g: p.proteinG, pct: pP, c: "#e74c3c" },
              { l: "脂質", g: p.fatG, pct: fP, c: "#f39c12" },
              { l: "炭水化物", g: p.carbG, pct: cP, c: "#2ecc71" }
            ].map(i => `
              <div style="flex:1;background:#f8faf9;border-radius:12px;padding:12px 8px;text-align:center">
                <div style="width:8px;height:8px;border-radius:50%;background:${i.c};margin:0 auto 6px"></div>
                <div style="font-size:10px;color:#888">${i.l}</div>
                <div style="font-size:20px;font-weight:800">${i.g}g</div>
                <div style="font-size:10px;color:#aaa">${i.pct}%</div>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="card" style="text-align:center">
          <div style="font-size:16px;font-weight:800;color:#1a2e23;margin-bottom:4px">🍽️ 食事メニューの作成</div>
          <div style="font-size:12px;color:#7a8f82;margin-bottom:14px">生活リズムや好みに合わせた食事プラン</div>
          <button class="btn-primary" onclick="setStep(6)">Step 2 へ進む →</button>
        </div>

        <button style="width:100%;padding:14px;border-radius:14px;border:2px solid #e0e5e2;background:#fff;color:#888;font-weight:700;font-size:14px;margin-top:4px" onclick="resetAll()">最初からやり直す</button>
      `;
    }

    function renderStep6() {
      const d = S.d;
      const canNext = d.wakeTime && d.sleepTime && d.mealSplit;
      return `
        ${progressBar(0, 4)}
        <div class="s2-badge">STEP 2</div>
        ${titleBlock("⏰", "生活リズム", "起床・就寝時間と食事回数")}

        <div style="display:flex;flex-direction:column;gap:16px">
          <div>
            <span class="label">起床時間</span>
            <select class="select" onchange="updR('wakeTime', this.value)">
              ${Array.from({ length: 12 }, (_, i) => i + 4).map(h => `<option value="${h}" ${String(h) === String(d.wakeTime) ? "selected" : ""}>${String(h).padStart(2, "0")}:00</option>`).join("")}
            </select>
          </div>

          <div>
            <span class="label">就寝時間</span>
            <select class="select" onchange="updR('sleepTime', this.value)">
              ${Array.from({ length: 10 }, (_, i) => i + 20).map(h => {
                const v = h > 23 ? h - 24 : h;
                return `<option value="${v}" ${String(v) === String(d.sleepTime) ? "selected" : ""}>${String(v).padStart(2, "0")}:00</option>`;
              }).join("")}
            </select>
          </div>

          <div>
            <span class="label">食事回数</span>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${MSPLITS.map(m => `
                <button class="split-btn ${d.mealSplit === m.id ? "active" : ""}" onclick="updR('mealSplit', '${m.id}')">
                  <span style="font-size:22px">${m.icon}</span> ${m.label}
                </button>
              `).join("")}
            </div>
          </div>

          ${navBtns("setStep(5)", "setStep(7)", !canNext)}
        </div>
      `;
    }

    function renderStep7() {
      const d = S.d;
      const nD = d.drinkFreq === "飲まない";
      const canNow = d.drinkFreq && (nD || (d.drinkType && parseInt(d.drinkAmount) > 0));
      const showAllow = canNow && !nD;
      const nAD = d.drinkAllowFreq === "飲まない";
      const canNext = nD || (d.drinkAllowFreq && (nAD || (d.drinkAllowType && parseInt(d.drinkAllowAmount) > 0)));
      const curDK = currentDrinkDailyKcal();
      const alDK = allowDrinkDailyKcal();

      return `
        ${progressBar(1, 4)}
        <div class="s2-badge">STEP 2</div>
        ${titleBlock("🍺", "お酒について", "現在の飲酒量と目標中の許容量")}

        <div style="display:flex;flex-direction:column;gap:16px">
          <div style="background:#fff;border-radius:16px;padding:16px;border:1px solid #e8ece9">
            <div style="font-size:13px;font-weight:800;color:#1a2e23;margin-bottom:12px">📊 現在の飲酒量</div>
            <div>
              <span class="label">飲む頻度</span>
              <select class="select" onchange="updR('drinkFreq', this.value); if (this.value === '飲まない') { upd('drinkType',''); upd('drinkAmount','0'); upd('drinkAllowFreq','飲まない'); upd('drinkAllowType',''); upd('drinkAllowAmount','0'); render(); }">
                <option value="">選択してください</option>
                ${DF.map(f => `<option value="${esc(f)}" ${d.drinkFreq === f ? "selected" : ""}>${esc(f)}</option>`).join("")}
              </select>
            </div>

            ${
              !nD && d.drinkFreq
                ? `
                  <div style="margin-top:12px">
                    <span class="label">よく飲むお酒</span>
                    <select class="select" onchange="updR('drinkType', this.value)">
                      <option value="">選択してください</option>
                      ${DRINK_TYPES.map(t => `<option value="${esc(t.label)}" ${d.drinkType === t.label ? "selected" : ""}>${esc(t.label)}（約${t.kcal}kcal）</option>`).join("")}
                    </select>
                  </div>
                  <div style="margin-top:12px">
                    <span class="label">1回に飲む量</span>
                    <input class="input" type="number" value="${esc(d.drinkAmount)}" oninput="upd('drinkAmount', this.value)" onblur="render()" placeholder="例：2" min="0" />
                  </div>
                `
                : ""
            }

            ${
              curDK > 0
                ? `
                  <div style="background:#FFF5F5;border-radius:12px;padding:12px;text-align:center;margin-top:12px">
                    <div style="font-size:11px;color:#c0392b;font-weight:600">1日平均に換算した酒カロリー</div>
                    <div style="font-size:24px;font-weight:800;color:#c0392b">${curDK} kcal</div>
                  </div>
                `
                : ""
            }
          </div>

          ${
            showAllow
              ? `
                <div style="background:#fff;border-radius:16px;padding:16px;border:2px solid rgba(45,138,110,0.12)">
                  <div style="font-size:13px;font-weight:800;color:#2d8a6e;margin-bottom:12px">🎯 目標期間中の許容量</div>

                  <div>
                    <span class="label">頻度</span>
                    <select class="select" onchange="updR('drinkAllowFreq', this.value); if (this.value === '飲まない') { upd('drinkAllowType',''); upd('drinkAllowAmount','0'); render(); }">
                      <option value="">選択してください</option>
                      ${DF.map(f => `<option value="${esc(f)}" ${d.drinkAllowFreq === f ? "selected" : ""}>${esc(f)}</option>`).join("")}
                    </select>
                  </div>

                  ${
                    d.drinkAllowFreq && !nAD
                      ? `
                        <div style="margin-top:12px">
                          <span class="label">お酒の種類</span>
                          <select class="select" onchange="updR('drinkAllowType', this.value)">
                            <option value="">選択してください</option>
                            ${DRINK_TYPES.map(t => `<option value="${esc(t.label)}" ${d.drinkAllowType === t.label ? "selected" : ""}>${esc(t.label)}</option>`).join("")}
                          </select>
                        </div>
                        <div style="margin-top:12px">
                          <span class="label">1回の量</span>
                          <input class="input" type="number" value="${esc(d.drinkAllowAmount)}" oninput="upd('drinkAllowAmount', this.value)" onblur="render()" placeholder="例：1" min="0" />
                        </div>
                      `
                      : ""
                  }

                  ${
                    alDK > 0
                      ? `
                        <div style="background:#edf7f2;border-radius:12px;padding:12px;text-align:center;margin-top:12px">
                          <div style="font-size:11px;color:#2d8a6e;font-weight:600">1日平均の許容酒カロリー</div>
                          <div style="font-size:24px;font-weight:800;color:#2d8a6e">${alDK} kcal</div>
                          <div style="font-size:10px;color:#888;margin-top:4px">食事に使えるカロリー: ${S.plan.dailyCal - alDK} kcal</div>
                        </div>
                      `
                      : ""
                  }

                  ${
                    nAD
                      ? `<div style="background:#edf7f2;border-radius:12px;padding:12px;text-align:center;margin-top:12px"><div style="font-size:13px;font-weight:700;color:#2d8a6e">💪 禁酒で目標達成を加速！</div></div>`
                      : ""
                  }
                </div>
              `
              : ""
          }

          ${navBtns("setStep(6)", "setStep(8)", !canNext)}
        </div>
      `;
    }

    function renderStep8() {
      return `
        ${progressBar(2, 4)}
        <div class="s2-badge">STEP 2</div>
        ${titleBlock("🥕", "食の好み", "苦手な食材と調理について")}

        <div style="display:flex;flex-direction:column;gap:16px">
          <div>
            <span class="label">苦手な食材・アレルギー</span>
            <input class="input" value="${esc(S.d.dislikedFoods)}" oninput="upd('dislikedFoods', this.value)" onblur="render()" placeholder="例：セロリ、レバー" />
            <p class="mini-note">カンマ区切り。なければ空欄OK</p>
          </div>

          <div>
            <span class="label">調理できますか？</span>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${[
                ["yes", "👨‍🍳", "自炊できる"],
                ["some", "🍳", "簡単なものなら"],
                ["no", "🛒", "買うだけ"]
              ].map(([id, ic, lb]) => `
                <button class="cook-btn ${S.d.canCook === id ? "active" : ""}" onclick="updR('canCook', '${id}')">
                  <span style="font-size:24px">${ic}</span>
                  <span style="font-size:14px;font-weight:700;color:${S.d.canCook === id ? "#2d8a6e" : "#333"}">${lb}</span>
                </button>
              `).join("")}
            </div>
          </div>

          ${navBtns("setStep(7)", "setStep(9)", !S.d.canCook)}
        </div>
      `;
    }

    function renderStep9() {
      return `
        ${progressBar(3, 4)}
        <div class="s2-badge">STEP 2</div>
        ${titleBlock("🏪", "よく使うお店", "メニュー提案の参考にします")}

        <div style="display:flex;flex-direction:column;gap:16px">
          <div style="background:#fff;border-radius:14px;padding:14px;border:1px solid #e8ece9">
            <div style="font-size:13px;font-weight:800;margin-bottom:10px">🏪 コンビニ</div>
            <select class="select" onchange="updR('conv1', this.value)">
              <option value="">1店目</option>
              ${CVS.map(s => `<option value="${esc(s)}" ${S.d.conv1 === s ? "selected" : ""}>${esc(s)}</option>`).join("")}
            </select>
            <select class="select" style="margin-top:8px" onchange="updR('conv2', this.value)">
              <option value="">2店目（任意）</option>
              ${CVS.filter(s => s !== S.d.conv1).map(s => `<option value="${esc(s)}" ${S.d.conv2 === s ? "selected" : ""}>${esc(s)}</option>`).join("")}
            </select>
          </div>

          <div style="background:#fff;border-radius:14px;padding:14px;border:1px solid #e8ece9">
            <div style="font-size:13px;font-weight:800;margin-bottom:10px">🍜 飲食店</div>
            <input class="input" value="${esc(S.d.restaurant1)}" oninput="upd('restaurant1', this.value)" onblur="render()" placeholder="例：吉野家" />
            <input class="input" style="margin-top:8px" value="${esc(S.d.restaurant2)}" oninput="upd('restaurant2', this.value)" onblur="render()" placeholder="例：松屋（任意）" />
          </div>

          ${navBtns("setStep(8)", "genMeal()", false, "🍽️ メニューを作成！")}
        </div>
      `;
    }

    function render() {
      const app = document.getElementById("app");

      if (S.step === 0) {
        app.innerHTML = renderStep0();
        return;
      }
      if (S.step === 1) {
        app.innerHTML = renderStep1();
        return;
      }
      if (S.step === 2) {
        app.innerHTML = renderStep2();
        return;
      }
      if (S.step === 3) {
        app.innerHTML = renderStep3();
        return;
      }
      if (S.step === 4) {
        app.innerHTML = renderStep4();
        return;
      }
      if (S.step === 5 && S.plan) {
        app.innerHTML = renderStep5();
        return;
      }
      if (S.step === 6) {
        app.innerHTML = renderStep6();
        return;
      }
      if (S.step === 7) {
        app.innerHTML = renderStep7();
        return;
      }
      if (S.step === 8) {
        app.innerHTML = renderStep8();
        return;
      }
      if (S.step === 9) {
        app.innerHTML = renderStep9();
        return;
      }

      if (S.step === 10 && S.meal && S.plan) {
        if (S.tab === "profile") {
          app.innerHTML = renderProfileTab();
          return;
        }
        if (S.tab === "goal") {
          app.innerHTML = renderGoalTab();
          return;
        }
        if (S.tab === "weekly") {
          app.innerHTML = renderWeeklyTab();
          return;
        }
        app.innerHTML = renderTodayTab();
        return;
      }

      app.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#888">読み込み中…</div>`;
    }

    load();
    render();
  </script>
</body>
</html>
