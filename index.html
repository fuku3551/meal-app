<html lang="ja">
<head>

  <meta

    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="食事管理" />
  <title>食事管理アプリ</title>

    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      background: linear-gradient(180deg, #f0f5f2, #e8ede9);
      min-height: 100vh;
      min-height: 100dvh;
      color: #1a2e23;
    }

    input,
    select,
    button,
    textarea {
      font-family: "Noto Sans JP", sans-serif;
      touch-action: manipulation;
    }

    button {
      cursor: pointer;
      -webkit-appearance: none;
    }

    .shell {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      background: linear-gradient(180deg, #f0f5f2, #e8ede9);
    }

    .app {
      width: 100%;
      max-width: 440px;
      padding: 20px 16px 92px;
    }

    .progress {
      display: flex;
      gap: 4px;
      padding: 0 4px;
      margin-bottom: 20px;
    }

    .progress div {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #e0e5e2;
    }

    .progress div.active {
      background: linear-gradient(90deg, #2d8a6e, #3aaf8a);
    }

    .title-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .title-h {
      font-size: 20px;
      font-weight: 800;
      color: #1a2e23;
      margin: 0 0 4px;
      letter-spacing: -0.5px;
    }

    .title-sub {
      font-size: 13px;
      color: #7a8f82;
      margin: 0;
      line-height: 1.6;
    }

    .label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #5a6e62;
      margin-bottom: 6px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid #e8ece9;
      font-size: 16px;
      outline: none;
      background: #f8faf9;
      box-sizing: border-box;
    }

    .textarea {
      min-height: 92px;
      resize: vertical;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: #2d8a6e;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #2d8a6e, #3aaf8a);
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 4px 16px rgba(45, 138, 110, 0.3);
      margin-top: 8px;
    }

    .btn-primary:disabled {
      background: #ccc;
      box-shadow: none;
      cursor: default;
    }

    .btn-back {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #e0e5e2;
      background: #fff;
      color: #888;
      font-weight: 700;
      font-size: 15px;
    }

    .btn-next {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #2d8a6e, #3aaf8a);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
    }

    .btn-next:disabled {
      background: #ccc;
      cursor: default;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    .card-title {
      font-size: 12px;
      font-weight: 800;
      color: #2d8a6e;
      margin-bottom: 14px;
    }

    .gender-btn,
    .goal-btn,
    .pace-btn,
    .split-btn,
    .cook-btn {
      width: 100%;
      background: #fff;
      border: 2px solid #e8ece9;
      border-radius: 14px;
    }

    .gender-btn {
      flex: 1;
      padding: 18px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .goal-btn {
      padding: 20px 18px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      border-radius: 16px;
    }

    .pace-btn {
      padding: 16px 18px;
      text-align: left;
      font-size: 14px;
      font-weight: 700;
    }

    .split-btn {
      padding: 14px 16px;
      text-align: left;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cook-btn {
      padding: 14px 16px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .active-card {
      border-color: #2d8a6e !important;
      background: #edf7f2 !important;
    }

    .s2-badge {
      display: inline-block;
      background: #2d8a6e;
      color: #fff;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-around;
      padding: 6px 0;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      z-index: 500;
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.05);
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 4px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .tab-icon {
      font-size: 20px;
      opacity: 0.4;
    }

    .tab-icon.active {
      opacity: 1;
    }

    .tab-label {
      font-size: 9px;
      font-weight: 500;
      color: #999;
    }

    .tab-label.active {
      font-weight: 800;
      color: #2d8a6e;
    }

    .tab-dot {
      width: 16px;
      height: 2.5px;
      border-radius: 2px;
      background: #2d8a6e;
      margin-top: 1px;
    }

    .pfc-bar {
      display: flex;
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .day-btn {
      flex: 0 0 auto;
      padding: 8px 14px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }

    .day-btn.active {
      background: #2d8a6e;
      color: #fff;
    }

    .day-btn.inactive {
      background: #fff;
      color: #555;
    }

    .meal-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
    }

    .item-line {
      font-size: 13px;
      color: #444;
      padding-left: 8px;
      border-left: 3px solid rgba(45, 138, 110, 0.25);
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .item-src {
      font-size: 11px;
      color: #2d8a6e;
      font-weight: 700;
      margin-bottom: 4px;
      padding: 3px 8px;
      background: #edf7f2;
      border-radius: 6px;
      display: inline-block;
    }

    .tip-box {
      margin-top: 6px;
      font-size: 11px;
      color: #2d8a6e;
      background: #edf7f2;
      border-radius: 8px;
      padding: 6px 10px;
    }

    .notice-box {
      background: linear-gradient(135deg, #fff8e8, #fff3cf);
      border: 1px solid #ffe08a;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .success-box {
      background: linear-gradient(135deg, #edf7f2, #e3f1ec);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .water-bar {
      flex: 1;
      height: 24px;
      border-radius: 6px;
      background: #e8ece9;
      transition: background 0.3s;
    }

    .water-bar.filled {
      background: linear-gradient(180deg, #5bc0de, #3498db);
    }

    .fav-tag {
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid #ffe082;
      background: #fffde7;
      font-size: 11px;
      font-weight: 600;
      color: #e65100;
    }

    .search-result {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      text-align: left;
      margin-bottom: 4px;
    }

    .check-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 2px solid #e8ece9;
      font-size: 16px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .timeline-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      z-index: 1;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    .timeline-line {
      flex: 1;
      width: 2px;
      background: #e0e5e2;
    }

    .goal-header {
      background: linear-gradient(135deg, #1a2e23, #2d8a6e);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 16px;
      color: #fff;
      text-align: center;
    }

    .mini-muted {
      font-size: 10px;
      color: #888;
    }
  </style>
</head>

    function calc() {
      const d = S.d;
      const nA = parseFloat(d.age) || 0;
      const nH = parseFloat(d.height) || 0;
      const nW = parseFloat(d.weight) || 0;
      const nBf = parseFloat(d.bodyFat) || 0;

      const lbm = nW > 0 && nBf > 0 ? nW * (1 - nBf / 100) : 0;
      const fatM = nW - lbm;

      const jO = JOBS.find((j) => j.label === d.job);
      const fO = FRQ.find((f) => f.label === d.exerciseFreq);

      const bMSJ =
        d.gender && nA && nH && nW
          ? d.gender === "male"
            ? 10 * nW + 6.25 * nH - 5 * nA + 5
            : 10 * nW + 6.25 * nH - 5 * nA - 161
          : 0;

      const bKM = lbm > 0 ? 370 + 21.6 * lbm : 0;
      const bmr = bKM > 0 ? Math.round((bMSJ + bKM) / 2) : Math.round(bMSJ);
      const tdee = bmr && jO ? Math.round(bmr * (jO.factor + (fO ? fO.add : 0))) : 0;

      return { nA, nH, nW, nBf, lbm, fatM, bmr, tdee };
    }

    function genPlan() {
      const c = calc();
      const d = S.d;
      const tw = parseFloat(d.targetWeight) || c.nW;
      const tbf = parseFloat(d.targetBf) || c.nBf;
      const pace = parseFloat(d.pace) || 1;
      const wd = Math.abs(tw - c.nW);
      const mo = wd > 0 ? Math.ceil(wd / pace) : 1;
      const iC = d.goal === "cut";
      const iB = d.goal === "bulk";

      let dc = c.tdee;
      if (iC) dc = Math.round(c.tdee - (pace * 7700) / 30);
      if (iB) dc = Math.round(c.tdee + (pace * 7700) / 30);
      dc = Math.max(dc, d.gender === "male" ? 1400 : 1200);

      let pG, fG;
      if (iC) {
        pG = Math.round(c.lbm > 0 ? c.lbm * 2.2 : c.nW * 1.8);
        fG = Math.round(c.nW * 0.8);
      } else if (iB) {
        pG = Math.round(c.lbm > 0 ? c.lbm * 2.0 : c.nW * 1.6);
        fG = Math.round(c.nW * 0.9);
      } else {
        pG = Math.round(c.lbm > 0 ? c.lbm * 1.6 : c.nW * 1.2);
        fG = Math.round(c.nW * 0.8);
      }

      const cG = Math.round(Math.max((dc - pG * 4 - fG * 9) / 4, 50));
      const aC = pG * 4 + fG * 9 + cG * 4;

      S.plan = {
        currentWeight: c.nW,
        currentBf: c.nBf,
        lbm: c.lbm,
        fatMass: c.fatM,
        targetWeight: tw,
        targetBf: tbf,
        targetLBM: tw * (1 - tbf / 100),
        weightDiff: wd,
        months: mo,
        pace,
        tdee: c.tdee,
        dailyCal: dc,
        actualCal: aC,
        proteinG: pG,
        fatG: fG,
        carbG: cG,
        isCut: iC,
        isBulk: iB,
        bmr: c.bmr
      };

      S.step = 5;
      save();
      render();
    }

    function genMealLocal(plan, d, alDK) {
      const foodCal = plan.dailyCal - alDK;
      const srcs = [];

      if (d.canCook === "yes" || d.canCook === "some") srcs.push("自炊");
      [d.conv1, d.conv2]
        .filter((s) => s && s !== "使わない" && FOOD_DB[s])
        .forEach((s) => srcs.push(s));
      [d.restaurant1, d.restaurant2]
        .filter(Boolean)
        .forEach((r) => {
          if (FOOD_DB[r]) srcs.push(r);
        });

      if (srcs.length === 0) srcs.push("セブンイレブン");

      const disliked = (d.dislikedFoods || "")
        .split(/[,、，]/)
        .map((s) => s.trim().toLowerCase())
        .filter(Boolean);

      const ok = (item) => !disliked.some((x) => item.name.toLowerCase().includes(x));

      function poolBySrc(mt) {
        const byS = {};

        srcs.forEach((s) => {
          if (FOOD_DB[s]?.[mt]) {
            const items = FOOD_DB[s][mt].filter(ok).map((i) => ({ ...i, src: s }));
            if (items.length) byS[s] = items;
          }
        });

        ["セブンイレブン", "ファミリーマート", "ローソン"].forEach((s) => {
          if (!byS[s] && FOOD_DB[s]?.[mt]) {
            const items = FOOD_DB[s][mt].filter(ok).map((i) => ({ ...i, src: s }));
            if (items.length) byS[s] = items;
          }
        });

        return byS;
      }

      const hasS1 = d.mealSplit !== "3meals";
      const hasS2 = d.mealSplit === "3meals2snack";
      const snackNum = (hasS1 ? 1 : 0) + (hasS2 ? 1 : 0);
      const snackEach = snackNum > 0 ? Math.round(foodCal * 0.08) : 0;
      const mealCal = foodCal - snackEach * snackNum;
      const bC = Math.round(mealCal * 0.28);
      const lC = Math.round(mealCal * 0.4);
      const dC = mealCal - bC - lC;

      const w = parseInt(d.wakeTime) || 7;
      const sl = parseInt(d.sleepTime) || 23;
      const bT = `${String(w + 1).padStart(2, "0")}:00`;
      const lT = `${String(Math.max(w + 5, 12)).padStart(2, "0")}:00`;
      const dT = `${String(Math.min(sl - 2, 20)).padStart(2, "0")}:00`;
      const s1T = `${String(Math.max(w + 3, 10)).padStart(2, "0")}:00`;
      const s2T = `${String(Math.round((parseInt(lT, 10) + parseInt(dT, 10)) / 2)).padStart(2, "0")}:00`;

      const tips = [
        "野菜→タンパク質→炭水化物の順で",
        "よく噛んでゆっくり食べましょう",
        "食前にコップ1杯の水を",
        "タンパク質は毎食バランスよく",
        "食物繊維を先に食べると血糖値◎",
        "夜は炭水化物控えめに",
        "間食はタンパク質系がおすすめ"
      ];

      function pickFromSrc(srcItems, tgt) {
        if (!srcItems.length) return [];
        const shuffled = [...srcItems].sort(() => Math.random() - 0.5);
        const sel = [];
        let rem = tgt;

        const hp = shuffled.filter((i) => i.p >= 10 && i.kcal <= rem + 100);
        if (hp.length) {
          const p = hp[Math.floor(Math.random() * hp.length)];
          sel.push(p);
          rem -= p.kcal;
        }

        for (let i = 0; i < 20 && sel.length < 5 && rem > 50; i++) {
          const cands = shuffled.filter(
            (x) => !sel.find((s) => s.name === x.name) && x.kcal <= rem + 80 && x.kcal >= 15
          );
          if (!cands.length) break;
          const p = cands[Math.floor(Math.random() * cands.length)];
          sel.push(p);
          rem -= p.kcal;
        }

        if (rem > 100) {
          const rice = Math.round(rem / 235);
          if (rice >= 1) {
            sel.push({
              name: `白米ご飯${rice > 1 ? rice + "杯" : "1杯"}`,
              kcal: rice * 235,
              p: rice * 4.0,
              f: rice * 0.5,
              c: rice * 53.4,
              src: sel[0]?.src || "自炊"
            });
          }
        } else if (rem > 50) {
          sel.push({
            name: "白米ご飯（小）",
            kcal: 118,
            p: 2.0,
            f: 0.3,
            c: 26.7,
            src: sel[0]?.src || "自炊"
          });
        }

        return sel;
      }

      function pickMeal(mt, tgt) {
        const byS = poolBySrc(mt);
        const keys = Object.keys(byS);
        if (!keys.length) return [];
        const chosen = keys[Math.floor(Math.random() * keys.length)];
        return pickFromSrc(byS[chosen], tgt);
      }

      const drinkDays = new Set();
      const dpw = DFM[d.drinkAllowFreq] || 0;
      if (dpw >= 7) {
        for (let i = 0; i < 7; i++) drinkDays.add(i);
      } else if (dpw > 0) {
        [4, 5, 6, 3, 2, 1, 0].slice(0, Math.round(dpw)).forEach((i) => drinkDays.add(i));
      }

      const DAYS = ["月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日", "日曜日"];

      const sm = (items) => ({
        kcal: items.reduce((s, i) => s + i.kcal, 0),
        p: Math.round(items.reduce((s, i) => s + i.p, 0) * 10) / 10,
        f: Math.round(items.reduce((s, i) => s + i.f, 0) * 10) / 10,
        c: Math.round(items.reduce((s, i) => s + i.c, 0) * 10) / 10
      });

      const fmtItems = (items) => {
        if (!items.length) return [];
        const src = items[0]?.src;
        const srcLabel = src && src !== "自炊" ? `📍 ${src}` : src === "自炊" ? "📍 自炊" : "";
        const names = items.map((i) => i.name);
        return srcLabel ? [srcLabel, ...names] : names;
      };

      const wp = DAYS.map((day, idx) => {
        const bI = pickMeal("breakfast", bC);
        const lI = pickMeal("lunch", lC);
        const dI = pickMeal("dinner", dC);

        const meals = {
          breakfast: { time: bT, items: fmtItems(bI), ...sm(bI), tip: tips[idx % 7] },
          lunch: { time: lT, items: fmtItems(lI), ...sm(lI), tip: tips[(idx + 1) % 7] },
          dinner: { time: dT, items: fmtItems(dI), ...sm(dI), tip: tips[(idx + 2) % 7] }
        };

        if (hasS1) {
          const s = pickMeal("snack", snackEach);
          meals.snack1 = { time: s1T, items: fmtItems(s), ...sm(s), tip: "タンパク質系の間食がおすすめ" };
        }

        if (hasS2) {
          const s = pickMeal("snack", snackEach);
          meals.snack2 = { time: s2T, items: fmtItems(s), ...sm(s), tip: "ナッツや果物でエネルギー補給" };
        }

        let alcohol = null;
        let ak = 0;
        if (drinkDays.has(idx) && d.drinkAllowType) {
          const dt = DRINK_TYPES.find((t) => t.label === d.drinkAllowType);
          const amt = parseInt(d.drinkAllowAmount) || 1;
          if (dt) {
            ak = dt.kcal * amt;
            alcohol = {
              items: [`${d.drinkAllowType} × ${amt}${dt.unit}`],
              kcal: ak
            };
          }
        }

        const totalKcal = Object.values(meals).reduce((s, m) => s + m.kcal, 0) + ak;
        const totalP = Math.round(Object.values(meals).reduce((s, m) => s + m.p, 0) * 10) / 10;
        const totalF = Math.round(Object.values(meals).reduce((s, m) => s + m.f, 0) * 10) / 10;
        const totalC = Math.round(Object.values(meals).reduce((s, m) => s + m.c, 0) * 10) / 10;

        return { day, meals, alcohol, totalKcal, totalP, totalF, totalC };
      });

      return {
        weeklyPlan: wp,
        generalTips: [
          plan.isCut
            ? "タンパク質をしっかり摂って筋肉キープ"
            : plan.isBulk
            ? "炭水化物を恐れずトレーニング前後に"
            : "バランスの良い食事で体調維持",
          "水分は1日2L以上。代謝アップに効果的",
          "食べる順番は『野菜→タンパク質→炭水化物』"
        ],
        alcoholAdvice:
          dpw > 0 && d.drinkAllowType
            ? `お酒は週${Math.round(dpw)}回程度に。ハイボールや焼酎は糖質少なめでおすすめ。`
            : "禁酒で目標達成を加速。全カロリーを栄養ある食事に使えます。"
      };
    }

    function genMeal() {
      S.meal = genMealLocal(S.plan, S.d, allowDrinkKcal());
      S.selDay = 0;
      S.step = 10;
      S.tab = "today";
      S.onboardingDone = true;
      save();
      render();
    }

    function getGoalComment(expected, actual, isCut, isLast) {
      if (actual === "" || actual === null || actual === undefined) return "";
      const diff = parseFloat(actual) - expected;
      const good = (isCut && diff <= 0) || (!isCut && diff >= 0);

      if (good) {
        return isLast
          ? "素晴らしいです。目標達成ラインにしっかり乗れています。この調子で次のステージへ進みましょう。"
          : "良い流れです。この調子で来月もコツコツ継続していきましょう。";
      }

      const abs = Math.abs(diff).toFixed(1);
      return isCut
        ? `目標より${abs}kg上でした。焦らず、間食や夜の炭水化物を少し整えていけば十分巻き返せます。`
        : `目標より${abs}kg下でした。たんぱく質と炭水化物を少し増やして、来月の伸びに繋げましょう。`;
    }

    function openAddFood(cat) {
      S.addMode = true;
      S.addCat = cat;
      S.foodSearch = "";
      S.addTime = "";
      render();
      setTimeout(() => {
        const el = document.getElementById("food-search-box");
        if (el) el.focus();
      }, 50);
    }

    function closeAddFood() {
      S.addMode = false;
      S.addCat = "";
      S.foodSearch = "";
      S.addTime = "";
      render();
    }

    function updateAddTime(v) {
      S.addTime = v;
      save();
    }

    function addFoodItem(cat, item) {
      const dayIdx = new Date().getDay();
      const todayIdx = dayIdx === 0 ? 6 : dayIdx - 1;

      if (!S.log[todayIdx]) S.log[todayIdx] = {};
      if (!S.log[todayIdx].eaten) S.log[todayIdx].eaten = {};
      if (!S.log[todayIdx].eaten[cat]) S.log[todayIdx].eaten[cat] = [];

      S.log[todayIdx].eaten[cat].push(item);
      S.addMode = false;
      S.addCat = "";
      S.foodSearch = "";
      S.addTime = "";
      save();
      render();
    }

    function pickFood(cat, idx) {
      const allFoods = getAllFoods();
      const q = S.foodSearch.toLowerCase();
      const results = allFoods
        .filter((f) => f.name.toLowerCase().includes(q) || (f.cat || "").toLowerCase().includes(q))
        .slice(0, 12);

      const f = results[idx];
      if (!f) return;
      const isW = (f.cat || f.src || "").includes("🚨");
      const isD = (f.cat || "").includes("🍺");
      addFoodItem(cat, {
        name: f.name,
        kcal: f.kcal,
        p: f.p,
        f: f.f,
        c: f.c,
        time: S.addTime,
        warn: isW,
        drink: isD
      });
    }

    function pickFav(cat, idx) {
      const f = S.favorites[idx];
      if (!f) return;
      addFoodItem(cat, { ...f, time: S.addTime });
    }

    function addCustomFood(cat) {
      const name = document.getElementById("cf-name")?.value;
      if (!name) return;
      const kcal = parseFloat(document.getElementById("cf-kcal")?.value) || 0;
      const p = parseFloat(document.getElementById("cf-p")?.value) || 0;
      const f = parseFloat(document.getElementById("cf-f")?.value) || 0;
      const c = parseFloat(document.getElementById("cf-c")?.value) || 0;

      addFoodItem(cat, {
        name,
        kcal,
        p,
        f,
        c,
        time: S.addTime
      });
    }

    function toggleFav(idx) {
      const allFoods = getAllFoods();
      const q = S.foodSearch.toLowerCase();
      const results = allFoods
        .filter((f) => f.name.toLowerCase().includes(q) || (f.cat || "").toLowerCase().includes(q))
        .slice(0, 12);

      const f = results[idx];
      if (!f) return;

      const existing = S.favorites.findIndex((x) => x.name === f.name);
      if (existing >= 0) {
        S.favorites.splice(existing, 1);
      } else {
        const isW = (f.cat || f.src || "").includes("🚨");
        const isD = (f.cat || "").includes("🍺");
        S.favorites.push({
          name: f.name,
          kcal: f.kcal,
          p: f.p,
          f: f.f,
          c: f.c,
          warn: isW,
          drink: isD
        });
      }
      save();
      renderSearchResultsOnly();
    }

    function updateSearch(v) {
      S.foodSearch = v;
      renderSearchResultsOnly();
    }

    function renderSearchResultsOnly() {
      const el = document.getElementById("search-results");
      if (el) el.innerHTML = renderSearchResults();
    }

    function renderSearchResults() {
      const q = S.foodSearch.toLowerCase();
      const cat = S.addCat;
      if (!q) return "";

      const allFoods = getAllFoods();
      const results = allFoods
        .filter((f) => f.name.toLowerCase().includes(q) || (f.cat || "").toLowerCase().includes(q))
        .slice(0, 12);

      let h = "";
      results.forEach((f, i) => {
        const isW = (f.cat || f.src || "").includes("🚨");
        const isD = (f.cat || "").includes("🍺");
        const bg = isW ? "#FFF5F5" : isD ? "#FFF8E1" : "#fff";
        const tc = isW ? "#c0392b" : isD ? "#E65100" : "#333";
        const isFav = S.favorites.some((x) => x.name === f.name);

        h += `
          <div style="display:flex;gap:4px;margin-bottom:4px">
            <button class="search-result" style="background:${bg}" onclick="pickFood('${cat}', ${i})">
              <div style="font-size:12px;color:${tc};font-weight:600">${esc(f.name)}</div>
              <div style="font-size:9px;color:#999">${f.kcal}kcal P:${f.p}g F:${f.f}g C:${f.c}g</div>
            </button>
            <button
              style="width:30px;border-radius:6px;border:none;background:transparent;font-size:16px;color:${isFav ? "#f39c12" : "#ddd"}"
              onclick="toggleFav(${i})"
            >${isFav ? "★" : "☆"}</button>
          </div>
        `;
      });
      return h;
    }

    function renderAddPanel(cat) {
      return `
        <div style="margin-top:8px;background:#f8faf9;border-radius:10px;padding:10px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="font-size:11px;font-weight:700;color:#5a6e62;white-space:nowrap">🕐 時間</div>
            <input type="time" value="${esc(S.addTime)}" onchange="updateAddTime(this.value)" class="input" style="font-size:13px;padding:8px 10px;flex:1" />
          </div>

          ${
            S.favorites.length > 0
              ? `
            <div style="margin-bottom:8px">
              <div style="font-size:10px;font-weight:700;color:#f39c12;margin-bottom:4px">⭐ お気に入り</div>
              <div style="display:flex;flex-wrap:wrap;gap:4px">
                ${S.favorites
                  .map(
                    (fv, i) => `
                  <button class="fav-tag" onclick="pickFav('${cat}', ${i})">
                    ${esc(fv.name)} <span style="font-size:9px;color:#999">${fv.kcal}</span>
                  </button>
                `
                  )
                  .join("")}
              </div>
            </div>
          `
              : ""
          }

          <input
            id="food-search-box"
            class="input"
            style="font-size:13px;padding:10px 12px;margin-bottom:6px"
            value="${esc(S.foodSearch)}"
            oninput="updateSearch(this.value)"
            placeholder="食品名で検索..."
          />

          <div id="search-results" style="max-height:220px;overflow-y:auto;margin-bottom:6px">
            ${renderSearchResults()}
          </div>

          <div style="font-size:10px;font-weight:700;color:#5a6e62;margin-bottom:4px">手入力</div>
          <input id="cf-name" class="input" style="font-size:12px;padding:8px 10px;margin-bottom:4px" placeholder="品名" />
          <div style="display:flex;gap:4px;margin-bottom:6px">
            <input id="cf-kcal" class="input" type="number" style="flex:1;font-size:11px;padding:8px 6px" placeholder="kcal" />
            <input id="cf-p" class="input" type="number" style="flex:1;font-size:11px;padding:8px 6px" placeholder="P" />
            <input id="cf-f" class="input" type="number" style="flex:1;font-size:11px;padding:8px 6px" placeholder="F" />
            <input id="cf-c" class="input" type="number" style="flex:1;font-size:11px;padding:8px 6px" placeholder="C" />
          </div>
          <div style="display:flex;gap:6px">
            <button style="flex:1;padding:8px;border-radius:8px;border:1px solid #e0e5e2;background:#fff;color:#888;font-weight:700;font-size:12px" onclick="closeAddFood()">閉じる</button>
            <button style="flex:1;padding:8px;border-radius:8px;border:none;background:#2d8a6e;color:#fff;font-weight:700;font-size:12px" onclick="addCustomFood('${cat}')">追加</button>
          </div>
        </div>
      `;
    }

    function removeTodayItem(todayIdx, cat, idx) {
      const dayE = S.log[todayIdx]?.eaten || {};
      const arr = [...(dayE[cat] || [])];
      arr.splice(idx, 1);

      if (!S.log[todayIdx]) S.log[todayIdx] = {};
      if (!S.log[todayIdx].eaten) S.log[todayIdx].eaten = {};
      S.log[todayIdx].eaten[cat] = arr;
      save();
      render();
    }

    function setWater(key, val) {
      S.water[key] = val;
      save();
      render();
    }

    function setCheck(day, meal, sym) {
      if (!S.log[day]) S.log[day] = {};
      if (!S.log[day].checks) S.log[day].checks = {};
      S.log[day].checks[meal] = sym;
      save();
      render();
    }

    function addBodyLog() {
      const bw = parseFloat(document.getElementById("bw-input")?.value);
      const bf = parseFloat(document.getElementById("bf-input")?.value);
      if (!bw) return;

      S.bodyLog.push({
        date: `${new Date().getMonth() + 1}/${new Date().getDate()}`,
        w: bw,
        bf: bf || 0
      });

      if (S.bodyLog.length > 20) S.bodyLog = S.bodyLog.slice(-20);
      save();
      render();
    }

    function setGoalActual(idx, val) {
      if (!S.log.goalActuals) S.log.goalActuals = {};
      S.log.goalActuals[idx] = val;
      save();
      render();
    }

    function genDailyFeedback(eK, eP, eF, eC, plan, allEaten) {
      const msgs = [];
      const tgtK = plan?.dailyCal || 2000;
      const pDiff = eP - (plan?.proteinG || 0);
      const cDiff = eC - (plan?.carbG || 0);
      const fDiff = eF - (plan?.fatG || 0);
      const kDiff = eK - tgtK;

      msgs.push("お疲れ様です☺️ 今日も記録までできたのがとても素晴らしいです。");

      if (Math.abs(kDiff) <= tgtK * 0.05) {
        msgs.push("🎉 カロリーはほぼピッタリです。とても上手にコントロールできています。");
      } else if (kDiff > 0) {
        msgs.push(`⚡ 目標より${kDiff}kcal多めでした。明日は間食を1つ減らすか、夕食を少し軽めにしてみましょう。`);
      } else {
        msgs.push(
          `📉 目標より${Math.abs(kDiff)}kcal少なめでした。${
            plan?.isCut
              ? "減量中なら大きな問題はありませんが、極端な我慢はしないようにしましょう。"
              : "もう少し食べても大丈夫です。特にたんぱく質を意識すると良いです。"
          }`
        );
      }

      if (pDiff < -10) {
        msgs.push(`💪 タンパク質が${Math.abs(Math.round(pDiff))}g不足でした。明日は卵・チキン・ヨーグルトをプラスしてみましょう。`);
      } else {
        msgs.push("✅ タンパク質はしっかり意識できています。筋肉維持にとても良い流れです。");
      }

      if (fDiff > 15) {
        msgs.push(`🫒 脂質が${Math.round(fDiff)}g多めでした。明日は揚げ物より焼き・蒸し中心にすると整えやすいです。`);
      }

      if (cDiff > 30) {
        msgs.push("🍚 炭水化物が少し多めでした。夜のご飯量を少しだけ減らすとバランスが整いやすいです。");
      }

      const warns = allEaten.filter((e) => e.warn);
      if (warns.length > 0) {
        msgs.push(`🍩 お菓子やスイーツは${warns.length}品でした。責めなくて大丈夫です。次は代わりにナッツやプロテインバーも候補にしてみましょう。`);
      }

      const drinks = allEaten.filter((e) => e.drink);
      if (drinks.length > 0) {
        const dk = drinks.reduce((s, e) => s + e.kcal, 0);
        msgs.push(`🍺 お酒で${dk}kcalでした。切り替えるならハイボールや焼酎系が整えやすいです。`);
      }

      msgs.push("🌱 明日も完璧を目指すより、昨日より少し整える気持ちでいけば大丈夫です。");
      return msgs;
    }

    function completeMeal(todayIdx) {
      const plan = S.plan;
      const tLog = S.log[todayIdx] || {};
      const tEaten = tLog.eaten || {};
      const allE = [];
      MO.forEach((k) => {
        (tEaten[k] || []).forEach((e) => allE.push(e));
      });

      const eK = allE.reduce((s, e) => s + (e.kcal || 0), 0);
      const eP = allE.reduce((s, e) => s + (e.p || 0), 0);
      const eF = allE.reduce((s, e) => s + (e.f || 0), 0);
      const eC = allE.reduce((s, e) => s + (e.c || 0), 0);

      S.dailyDone[todayIdx] = genDailyFeedback(eK, eP, eF, eC, plan, allE);
      save();
      render();

              <div class="label">体重（kg）</div>

              onclick="addBodyLog()"
            >記録</button>
          </div>

          ${
            S.bodyLog.length > 0
              ? `
            <div style="display:flex;align-items:flex-end;gap:4px;height:80px">
              ${(() => {
                const ws = S.bodyLog.map((b) => b.w);
                const mn = Math.min(...ws) - 2;
                const mx = Math.max(...ws) + 2;
                const rng = mx - mn || 1;
                return S.bodyLog
                  .map((b, i) => {
                    const ht = Math.max(((b.w - mn) / rng) * 65 + 10, 10);
                    const isL = i === S.bodyLog.length - 1;
                    return `
                      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
                        <div style="font-size:7px;color:${isL ? "#2d8a6e" : "#999"};font-weight:${isL ? "800" : "500"}">${b.w}</div>
                        <div style="width:100%;height:${ht}px;border-radius:3px;background:${isL ? "linear-gradient(180deg,#2d8a6e,#3aaf8a)" : "#c8ddd2"}"></div>
                        <div style="font-size:6px;color:#bbb">${b.date}</div>
                      </div>
                    `;
                  })
                  .join("");
              })()}
            </div>
            <button style="width:100%;margin-top:6px;padding:6px;border:none;background:transparent;color:#ccc;font-size:10px" onclick="S.bodyLog.pop();save();render()">最後の記録を取り消す</button>
          `
              : '<div style="text-align:center;color:#ccc;font-size:12px;padding:10px 0">まだ記録なし</div>'
          }
        </div>
      `;

      catKeys.forEach((k) => {
        const m = todayPlan.meals[k];
        const catEaten = todayEaten[k] || [];
        const catKcal = catEaten.reduce((s, e) => s + (e.kcal || 0), 0);

        h += `
          <div class="meal-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <div style="font-size:13px;font-weight:800;color:#1a2e23">${ML[k]}</div>
              <div style="font-size:10px;color:#888">予定 ${m.kcal}kcal → 実績 <span style="font-weight:800;color:${catKcal > 0 ? "#2d8a6e" : "#ccc"}">${catKcal}kcal</span></div>
            </div>

            <div style="background:#f8faf9;border-radius:10px;padding:8px 10px;margin-bottom:8px;opacity:0.75">
              <div style="font-size:10px;color:#7a8f82;font-weight:600;margin-bottom:4px">📋 提案メニュー</div>
              ${m.items
                .filter((it) => !it.startsWith("📍"))
                .map((it) => `<div style="font-size:11px;color:#5a6e62;line-height:1.5">${esc(it)}</div>`)
                .join("")}
            </div>

            ${catEaten
              .map((item, idx) => {
                const bg = item.warn ? "#FFF5F5" : item.drink ? "#FFF8E1" : "#edf7f2";
                const tc = item.warn ? "#c0392b" : item.drink ? "#E65100" : "#2d8a6e";
                const icon = item.warn ? "⚠️" : item.drink ? "🍺" : "✓";
                return `
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;${idx < catEaten.length - 1 ? "border-bottom:1px solid #f0f0f0" : ""}">
                    <div style="display:flex;align-items:center;gap:6px">
                      <span style="font-size:10px;width:18px;height:18px;border-radius:6px;background:${bg};display:flex;align-items:center;justify-content:center;color:${tc};font-weight:700">${icon}</span>
                      <div>
                        <div style="font-size:12px;font-weight:600;color:${tc}">${item.time ? `<span style="font-size:10px;color:#888;margin-right:4px">${item.time}</span>` : ""}${esc(item.name)}</div>
                        <div style="font-size:9px;color:#999">${item.kcal}kcal P:${item.p}g F:${item.f}g C:${item.c}g</div>
                      </div>
                    </div>
                    <button
                      style="width:22px;height:22px;border-radius:6px;border:none;background:#f5f5f5;color:#ccc;font-size:12px"
                      onclick="removeTodayItem(${todayIdx}, '${k}', ${idx})"
                    >×</button>
                  </div>
                `;
              })
              .join("")}

            ${S.addMode && S.addCat === k ? renderAddPanel(k) : `
              <button
                style="width:100%;padding:8px;border-radius:8px;border:1.5px dashed #c8ddd2;background:transparent;color:#2d8a6e;font-weight:700;font-size:11px;margin-top:6px"
                onclick="openAddFood('${k}')"
              >＋ 食べたものを追加</button>
            `}
          </div>
        `;
      });

      const todayKey = `${new Date().getFullYear()}-${new Date().getMonth()}-${new Date().getDate()}`;
      const cups = S.water[todayKey] || 0;

      h += `
        <div class="meal-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="font-size:13px;font-weight:800;color:#1a2e23">💧 水分摂取</div>
            <div style="font-size:11px;color:${cups >= 8 ? "#2d8a6e" : "#888"};font-weight:700">${cups}/8杯（${(cups * 0.25).toFixed(1)}L / 2L）</div>
          </div>
          <div style="display:flex;gap:4px;margin-bottom:8px">
            ${Array.from({ length: 8 })
              .map(
                (_, i) => `
              <div class="water-bar ${i < cups ? "filled" : ""}" onclick="setWater('${todayKey}', ${i + 1})"></div>
            `
              )
              .join("")}
          </div>
          <div style="display:flex;gap:8px;justify-content:center">
            <button style="width:36px;height:36px;border-radius:10px;border:2px solid #e8ece9;background:#fff;font-size:18px;color:#888" onclick="setWater('${todayKey}', Math.max(${cups} - 1, 0))">−</button>
            <button style="width:36px;height:36px;border-radius:10px;border:none;background:linear-gradient(135deg,#3498db,#5bc0de);font-size:18px;color:#fff" onclick="setWater('${todayKey}', Math.min(${cups} + 1, 12))">＋</button>
          </div>
          ${cups >= 8 ? '<div style="text-align:center;font-size:11px;color:#2d8a6e;font-weight:700;margin-top:6px">🎉 今日の水分目標達成！</div>' : ""}
        </div>
      `;

      if (!isDone) {
        h += `
          <button
            style="width:100%;padding:16px;border-radius:14px;border:none;background:${allEaten.length === 0 ? "#ccc" : "linear-gradient(135deg,#e74c3c,#c0392b)"};color:#fff;font-weight:800;font-size:16px;margin-top:12px"

            onclick="completeMeal(${todayIdx})"

        `;
      } else {
        h += `
          <div style="margin-top:12px">
            <div class="success-box">
              <div style="font-size:14px;font-weight:800;color:#2d8a6e;margin-bottom:10px;text-align:center">🏁 本日の食事レポート</div>
              <div style="display:flex;justify-content:space-around;text-align:center;margin-bottom:12px">
                <div><div class="mini-muted">目標</div><div style="font-size:18px;font-weight:800;color:#888">${tgtK}</div></div>
                <div style="font-size:18px;color:#2d8a6e;display:flex;align-items:center">→</div>
                <div><div class="mini-muted">実績</div><div style="font-size:18px;font-weight:800;color:${pct > 110 ? "#c0392b" : "#2d8a6e"}">${eK}</div></div>
                <div><div class="mini-muted">差</div><div style="font-size:18px;font-weight:800;color:${eK - tgtK > 0 ? "#c0392b" : "#2d8a6e"}">${eK - tgtK > 0 ? "+" : ""}${eK - tgtK}</div></div>

              ${isDone

                  (msg) => `
                <div style="font-size:12px;color:#3d5c4a;line-height:1.7;padding-left:10px;border-left:2px solid rgba(45,138,110,0.25);margin-bottom:8px">${esc(msg)}</div>
              `
                )
                .join("")}
            </div>

            <button
              style="width:100%;padding:12px;border-radius:12px;border:2px solid #e0e5e2;background:#fff;color:#888;font-weight:700;font-size:13px"

            >修正して再記録する</button>
          </div>
        `;
      }

      return h;
    }

    function render() {
      const app = document.getElementById("app");
      const c = calc();
      const d = S.d;

      if (S.step === 0) {
        const cn = isStep0Complete();
        app.innerHTML = `
          ${progressBar(0, 5)}
          ${titleBlock("📋", "基本情報", "あなたの体の情報を入力してください")}
          <div style="display:flex;flex-direction:column;gap:16px">
            <div>
              <span class="label">性別</span>
              <div style="display:flex;gap:10px">
                <button class="gender-btn ${d.gender === 'male' ? 'active-card' : ''}" onclick="updR('gender','male')">
                  <span style="font-size:28px">🙋‍♂️</span>
                  <span style="font-size:14px;font-weight:700;color:${d.gender === 'male' ? '#2d8a6e' : '#888'}">男性</span>
                </button>

                <button class="gender-btn ${d.gender === 'female' ? 'active-card' : ''}" onclick="updR('gender','female')">
                  <span style="font-size:28px">🙋‍♀️</span>
                  <span style="font-size:14px;font-weight:700;color:${d.gender === 'female' ? '#2d8a6e' : '#888'}">女性</span>
                </button>
              </div>
            </div>


<div><span class="label">年齢</span><input class="input" type="number" value="${esc(d.age)}" oninput="upd('age', this.value)" placeholder="例：35" /></div>
<div><span class="label">身長（cm）</span><input class="input" type="number" value="${esc(d.height)}" oninput="upd('height', this.value)" placeholder="例：170" step="0.1" /></div>
<div><span class="label">体重（kg）</span><input class="input" type="number" value="${esc(d.weight)}" oninput="upd('weight', this.value)" placeholder="例：75" step="0.1" /></div>
<div><span class="label">体脂肪率（%）</span><input class="input" type="number" value="${esc(d.bodyFat)}" oninput="upd('bodyFat', this.value)" placeholder="例：25" step="0.1" /></div>
            <div id="step0-bodybox">
  ${
    c.nW > 0 && c.nBf > 0
      ? `
    <div style="background:#edf7f2;border-radius:14px;padding:14px 16px;display:flex;gap:12px">
      <div style="flex:1;text-align:center">
        <div style="font-size:10px;color:#5a6e62;font-weight:600">除脂肪体重</div>
        <div style="font-size:20px;font-weight:800;color:#2d8a6e">${c.lbm.toFixed(1)}kg</div>
      </div>
      <div style="width:1px;background:#c8ddd2"></div>
      <div style="flex:1;text-align:center">
        <div style="font-size:10px;color:#5a6e62;font-weight:600">体脂肪量</div>
        <div style="font-size:20px;font-weight:800;color:#c0392b">${c.fatM.toFixed(1)}kg</div>
      </div>
    </div>
  `
      : ""
  }
</div>

           <button id="step0next" class="btn-primary" ${cn ? "" : "disabled"} onclick="if(isStep0Complete()) setStep(1)">次へ →</button>
          </div>
        `;
        return;
      }

      if (S.step === 1) {
        const cn = d.job && d.exercise && (d.exercise === "なし" || d.exerciseFreq);
        let h = `
          ${progressBar(1, 5)}
          ${titleBlock("💼", "生活スタイル", "仕事と運動について教えてください")}
          <div style="display:flex;flex-direction:column;gap:16px">
            <div>
              <span class="label">仕事内容</span>
              <select class="select" onchange="updR('job', this.value)">
                <option value="">選択してください</option>
                ${JOBS.map((j) => `<option value="${esc(j.label)}" ${d.job === j.label ? "selected" : ""}>${esc(j.label)}</option>`).join("")}
              </select>
            </div>

            <div>
              <span class="label">運動項目</span>
              <select class="select" onchange="updR('exercise', this.value); if(this.value==='なし'){upd('exerciseFreq',''); render();}">
                <option value="">選択してください</option>
                ${EXLIST.map((e) => `<option value="${esc(e)}" ${d.exercise === e ? "selected" : ""}>${esc(e)}</option>`).join("")}
              </select>
            </div>
        `;

        if (d.exercise && d.exercise !== "なし") {
          h += `
            <div>
              <span class="label">運動頻度</span>
              <select class="select" onchange="updR('exerciseFreq', this.value)">
                <option value="">選択してください</option>
                ${FRQ.map((f) => `<option value="${esc(f.label)}" ${d.exerciseFreq === f.label ? "selected" : ""}>${esc(f.label)}</option>`).join("")}
              </select>
            </div>
          `;
        }

        if (c.tdee > 0) {
          h += `
            <div style="background:linear-gradient(135deg,#edf7f2,#e3f1ec);border-radius:16px;padding:18px 16px;text-align:center">
              <div style="font-size:11px;color:#5a6e62;font-weight:700;margin-bottom:6px">推定消費カロリー</div>
              <div style="font-size:36px;font-weight:800;color:#2d8a6e">${c.tdee} <span style="font-size:14px">kcal/日</span></div>
            </div>
          `;
        }

        h += `${navBtns("setStep(0)", "setStep(2)", !cn)}</div>`;
        app.innerHTML = h;
        return;
      }

      if (S.step === 2) {
        app.innerHTML = `
          ${progressBar(2, 5)}
          ${titleBlock("🎯", "目標体型", "どんな体を目指しますか？")}
          <div style="display:flex;flex-direction:column;gap:12px">
            ${GLS.map(
              (g) => `
              <button class="goal-btn ${d.goal === g.id ? "active-card" : ""}" onclick="updR('goal','${g.id}');upd('targetWeight','');upd('targetBf','');upd('pace','')">
                <span style="font-size:32px">${g.icon}</span>
                <div>
                  <div style="font-size:16px;font-weight:800;color:${d.goal === g.id ? "#2d8a6e" : "#333"}">${g.label}</div>
                  <div style="font-size:12px;color:#888">${g.desc}</div>
                </div>
              </button>
            `
            ).join("")}
            ${navBtns("setStep(1)", "setStep(3)", !d.goal)}
          </div>
        `;
        return;
      }

      if (S.step === 3) {
        const iM = d.goal === "maintain";
        const cn = iM || (d.targetWeight && d.targetBf);

        app.innerHTML = `
          ${progressBar(3, 5)}
          ${titleBlock("📐", "具体的な目標", iM ? "現在の体型をキープ" : "目標の体重・体脂肪率を設定")}
          <div style="display:flex;flex-direction:column;gap:16px">
            ${
              !iM
                ? `
              <div><span class="label">目標体重（kg）</span><input class="input" type="number" value="${esc(d.targetWeight)}" oninput="upd('targetWeight', this.value)" placeholder="${d.goal === "cut" ? `例：${Math.round(c.nW - 5)}` : `例：${Math.round(c.nW + 5)}`}" step="0.1" /></div>
              <div><span class="label">目標体脂肪率（%）</span><input class="input" type="number" value="${esc(d.targetBf)}" oninput="upd('targetBf', this.value)" placeholder="例：15" step="0.1" /></div>
            `
                : ""
            }
            ${navBtns(
              "setStep(2)",
              iM ? `upd('targetWeight','${c.nW}');upd('targetBf','${c.nBf}');upd('pace','0');setStep(4)` : "setStep(4)",
              !cn && !iM
            )}
          </div>
        `;
        return;
      }

      if (S.step === 4) {
        if (d.goal === "maintain") {
          genPlan();
          return;
        }

        const po = d.goal === "cut" ? PCut : PBulk;
        app.innerHTML = `
          ${progressBar(4, 5)}
          ${titleBlock("⏱️", "ペース設定", d.goal === "cut" ? "月にどのくらい減量？" : "月にどのくらい増量？")}
          <div style="display:flex;flex-direction:column;gap:10px">
            ${po
              .map(
                (p) => `
              <button class="pace-btn ${d.pace === String(p.v) ? "active-card" : ""}" onclick="updR('pace','${p.v}')">${p.label}</button>
            `
              )
              .join("")}
            ${navBtns("setStep(3)", "genPlan()", !d.pace, "プラン作成 🚀")}
          </div>
        `;
        return;
      }

      if (S.step === 5 && S.plan) {
        const p = S.plan;
        const pP = Math.round((p.proteinG * 4 / p.actualCal) * 100);
        const fP = Math.round((p.fatG * 9 / p.actualCal) * 100);
        const cP = 100 - pP - fP;

        app.innerHTML = `
          <div style="text-align:center;margin-bottom:20px">
            <div style="font-size:40px;margin-bottom:8px">✅</div>
            <h2 style="font-size:22px;font-weight:800;color:#1a2e23">あなたのプラン</h2>
          </div>

          <div class="card">
            <div class="card-title">📊 体組成の変化</div>
            <div style="display:flex;gap:8px">
              <div style="flex:1;background:#f4f6f5;border-radius:12px;padding:12px;text-align:center">
                <div class="mini-muted">現在</div>
                <div style="font-size:20px;font-weight:800">${p.currentWeight}kg</div>
                <div style="font-size:11px;color:#888">体脂肪${p.currentBf}%</div>
              </div>
              <div style="display:flex;align-items:center;font-size:20px;color:#2d8a6e">→</div>
              <div style="flex:1;background:#edf7f2;border-radius:12px;padding:12px;text-align:center">
                <div style="font-size:9px;color:#2d8a6e">目標</div>
                <div style="font-size:20px;font-weight:800;color:#2d8a6e">${p.targetWeight}kg</div>
                <div style="font-size:11px;color:#5a6e62">体脂肪${p.targetBf}%</div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">🔥 1日のカロリー</div>
            <div style="text-align:center">
              <div style="font-size:11px;color:#888">消費 ${p.tdee} kcal → 摂取目標</div>
              <div style="font-size:42px;font-weight:800;color:#1a2e23">${p.dailyCal} <span style="font-size:16px;color:#888">kcal</span></div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">🥗 PFCバランス</div>
            <div class="pfc-bar">
              <div style="width:${pP}%;background:#e74c3c"></div>
              <div style="width:${fP}%;background:#f39c12"></div>
              <div style="width:${cP}%;background:#2ecc71"></div>
            </div>
            <div style="display:flex;gap:8px">
              ${[
                { l: "タンパク質", g: p.proteinG, p: pP, c: "#e74c3c" },
                { l: "脂質", g: p.fatG, p: fP, c: "#f39c12" },
                { l: "炭水化物", g: p.carbG, p: cP, c: "#2ecc71" }
              ]
                .map(
                  (i) => `
                <div style="flex:1;background:#f8faf9;border-radius:12px;padding:12px 8px;text-align:center">
                  <div style="width:8px;height:8px;border-radius:50%;background:${i.c};margin:0 auto 6px"></div>
                  <div class="mini-muted">${i.l}</div>
                  <div style="font-size:20px;font-weight:800">${i.g}g</div>
                  <div style="font-size:10px;color:#aaa">${i.p}%</div>
                </div>
              `
                )
                .join("")}
            </div>
          </div>

          <div class="card" style="text-align:center">
            <div style="font-size:16px;font-weight:800;color:#1a2e23;margin-bottom:4px">🍽️ 食事メニューの作成</div>
            <div style="font-size:12px;color:#7a8f82;margin-bottom:14px">生活リズムや好みに合わせた食事プラン</div>
            <button class="btn-primary" onclick="setStep(6)">Step 2 へ進む →</button>
          </div>

          <button style="width:100%;padding:14px;border-radius:14px;border:2px solid #e0e5e2;background:#fff;color:#888;font-weight:700;font-size:14px;margin-top:4px" onclick="resetAll()">最初からやり直す</button>
        `;
        return;
      }

      if (S.step === 6) {
        const cn = d.wakeTime && d.sleepTime && d.mealSplit;
        app.innerHTML = `
          ${progressBar(0, 4)}
          <div class="s2-badge">STEP 2</div>
          ${titleBlock("⏰", "生活リズム", "起床・就寝時間と食事回数")}
          <div style="display:flex;flex-direction:column;gap:16px">
            <div>
              <span class="label">起床時間</span>
              <select class="select" onchange="updR('wakeTime', this.value)">
                ${Array.from({ length: 12 })
                  .map((_, i) => i + 4)
                  .map((h) => `<option value="${h}" ${d.wakeTime == String(h) ? "selected" : ""}>${String(h).padStart(2, "0")}:00</option>`)
                  .join("")}
              </select>
            </div>

            <div>
              <span class="label">就寝時間</span>
              <select class="select" onchange="updR('sleepTime', this.value)">
                ${Array.from({ length: 10 })
                  .map((_, i) => i + 20)
                  .map((h) => {
                    const v = h > 23 ? h - 24 : h;
                    return `<option value="${v}" ${d.sleepTime == String(v) ? "selected" : ""}>${String(v).padStart(2, "0")}:00</option>`;
                  })
                  .join("")}
              </select>
            </div>

            <div>
              <span class="label">食事回数</span>
              <div style="display:flex;flex-direction:column;gap:8px">
                ${MSplits.map(
                  (m) => `
                  <button class="split-btn ${d.mealSplit === m.id ? "active-card" : ""}" onclick="updR('mealSplit','${m.id}')">
                    <span style="font-size:22px">${m.icon}</span> ${m.label}
                  </button>
                `
                ).join("")}
              </div>
            </div>

            ${navBtns("setStep(5)", "setStep(7)", !cn)}
          </div>
        `;
        return;
      }

      if (S.step === 7) {
        const nD = d.drinkFreq === "飲まない";
        const cn = d.drinkFreq && (nD || (d.drinkType && parseInt(d.drinkAmount) > 0));
        const showAllow = cn && !nD;
        const nAD = d.drinkAllowFreq === "飲まない";
        const aR = nD || (d.drinkAllowFreq && (nAD || (d.drinkAllowType && parseInt(d.drinkAllowAmount) > 0)));

        let h = `
          ${progressBar(1, 4)}
          <div class="s2-badge">STEP 2</div>
          ${titleBlock("🍺", "お酒について", "現在の飲酒量と目標中の許容量")}
          <div style="display:flex;flex-direction:column;gap:16px">
            <div style="background:#fff;border-radius:16px;padding:16px;border:1px solid #e8ece9">
              <div style="font-size:13px;font-weight:800;color:#1a2e23;margin-bottom:12px">📊 現在の飲酒量</div>
              <div>
                <span class="label">飲む頻度</span>
                <select class="select" onchange="updR('drinkFreq',this.value); if(this.value==='飲まない'){upd('drinkType','');upd('drinkAmount','0');upd('drinkAllowFreq','飲まない');upd('drinkAllowType','');upd('drinkAllowAmount','0'); render();}">
                  <option value="">選択してください</option>
                  ${DF.map((f) => `<option value="${esc(f)}" ${d.drinkFreq === f ? "selected" : ""}>${esc(f)}</option>`).join("")}
                </select>
              </div>
        `;

        if (!nD && d.drinkFreq) {
          h += `
            <div style="margin-top:12px">
              <span class="label">よく飲むお酒</span>
              <select class="select" onchange="updR('drinkType',this.value)">
                <option value="">選択してください</option>
                ${DRINK_TYPES.map((t) => `<option value="${esc(t.label)}" ${d.drinkType === t.label ? "selected" : ""}>${esc(t.label)}（約${t.kcal}kcal）</option>`).join("")}
              </select>
            </div>
            <div style="margin-top:12px">
              <span class="label">1回に飲む量</span>
              <input class="input" type="number" value="${esc(d.drinkAmount)}" oninput="upd('drinkAmount', this.value)" placeholder="例：2" min="0" />
            </div>
          `;
        }

        const cDK = currentDrinkKcal();
        if (cDK > 0) {
          const dt = DRINK_TYPES.find((t) => t.label === d.drinkType);
          const perTime = dt ? dt.kcal * (parseInt(d.drinkAmount) || 0) : 0;
          h += `
            <div style="background:#FFF5F5;border-radius:12px;padding:12px;text-align:center;margin-top:12px">
              <div style="font-size:11px;color:#c0392b;font-weight:600">飲む日1回あたり</div>
              <div style="font-size:24px;font-weight:800;color:#c0392b">${perTime} kcal</div>
              <div style="font-size:10px;color:#888;margin-top:4px">1日平均 ${cDK} kcal</div>
            </div>
          `;
        }

        h += `</div>`;

        if (showAllow) {
          h += `
            <div style="background:#fff;border-radius:16px;padding:16px;border:2px solid rgba(45,138,110,0.12)">
              <div style="font-size:13px;font-weight:800;color:#2d8a6e;margin-bottom:12px">🎯 目標期間中の許容量</div>
              <div>
                <span class="label">頻度</span>
                <select class="select" onchange="updR('drinkAllowFreq',this.value); if(this.value==='飲まない'){upd('drinkAllowType','');upd('drinkAllowAmount','0'); render();}">
                  <option value="">選択してください</option>
                  ${DF.map((f) => `<option value="${esc(f)}" ${d.drinkAllowFreq === f ? "selected" : ""}>${esc(f)}</option>`).join("")}
                </select>
              </div>
          `;

          if (d.drinkAllowFreq && !nAD) {
            h += `
              <div style="margin-top:12px">
                <span class="label">お酒の種類</span>
                <select class="select" onchange="updR('drinkAllowType',this.value)">
                  <option value="">選択してください</option>
                  ${DRINK_TYPES.map((t) => `<option value="${esc(t.label)}" ${d.drinkAllowType === t.label ? "selected" : ""}>${esc(t.label)}</option>`).join("")}
                </select>
              </div>
              <div style="margin-top:12px">
                <span class="label">1回の量</span>
                <input class="input" type="number" value="${esc(d.drinkAllowAmount)}" oninput="upd('drinkAllowAmount', this.value)" placeholder="例：1" min="0" />
              </div>
            `;
          }

          if (nAD) {
            h += `
              <div style="background:#edf7f2;border-radius:12px;padding:12px;text-align:center;margin-top:12px">
                <div style="font-size:13px;font-weight:700;color:#2d8a6e">💪 禁酒で目標達成を加速！</div>
              </div>
            `;
          }

          h += `</div>`;
        }

        h += `${navBtns("setStep(6)", "setStep(8)", !aR)}</div>`;
        app.innerHTML = h;
        return;
      }

      if (S.step === 8) {
        app.innerHTML = `
          ${progressBar(2, 4)}
          <div class="s2-badge">STEP 2</div>
          ${titleBlock("🥕", "食の好み", "苦手な食材と調理について")}
          <div style="display:flex;flex-direction:column;gap:16px">
            <div>
              <span class="label">苦手な食材・アレルギー</span>
              <input class="input" value="${esc(d.dislikedFoods)}" oninput="upd('dislikedFoods', this.value)" placeholder="例：セロリ、レバー" />
              <p style="font-size:11px;color:#999;margin:6px 0 0">カンマ区切り。なければ空欄OK</p>
            </div>

            <div>
              <span class="label">調理できますか？</span>
              <div style="display:flex;flex-direction:column;gap:8px">
                ${[
                  ["yes", "👨‍🍳", "自炊できる"],
                  ["some", "🍳", "簡単なものなら"],
                  ["no", "🛒", "買うだけ"]
                ]
                  .map(
                    ([id, ic, lb]) => `
                  <button class="cook-btn ${d.canCook === id ? "active-card" : ""}" onclick="updR('canCook','${id}')">
                    <span style="font-size:24px">${ic}</span>
                    <span style="font-size:14px;font-weight:700;color:${d.canCook === id ? "#2d8a6e" : "#333"}">${lb}</span>
                  </button>
                `
                  )
                  .join("")}
              </div>
            </div>

            ${navBtns("setStep(7)", "setStep(9)", !d.canCook)}
          </div>
        `;
        return;
      }

      if (S.step === 9) {
        app.innerHTML = `
          ${progressBar(3, 4)}
          <div class="s2-badge">STEP 2</div>
          ${titleBlock("🏪", "よく使うお店", "メニュー提案の参考にします")}
          <div style="display:flex;flex-direction:column;gap:16px">
            <div style="background:#fff;border-radius:14px;padding:14px;border:1px solid #e8ece9">
              <div style="font-size:13px;font-weight:800;margin-bottom:10px">🏪 コンビニ</div>
              <select class="select" onchange="updR('conv1', this.value)">
                <option value="">1店目</option>
                ${CVS.map((s) => `<option value="${esc(s)}" ${d.conv1 === s ? "selected" : ""}>${esc(s)}</option>`).join("")}
              </select>
              <select class="select" style="margin-top:8px" onchange="updR('conv2', this.value)">
                <option value="">2店目（任意）</option>
                ${CVS.filter((s) => s !== d.conv1)
                  .map((s) => `<option value="${esc(s)}" ${d.conv2 === s ? "selected" : ""}>${esc(s)}</option>`)
                  .join("")}
              </select>
            </div>

            <div style="background:#fff;border-radius:14px;padding:14px;border:1px solid #e8ece9">
              <div style="font-size:13px;font-weight:800;margin-bottom:10px">🍜 飲食店</div>
              <input class="input" value="${esc(d.restaurant1)}" oninput="upd('restaurant1', this.value)" placeholder="例：吉野家" />
              <input class="input" style="margin-top:8px" value="${esc(d.restaurant2)}" oninput="upd('restaurant2', this.value)" placeholder="例：松屋（任意）" />
            </div>

            ${navBtns("setStep(8)", "genMeal()", false, "🍽️ メニューを作成！")}
          </div>
        `;
        return;
      }

      if (S.step === 10 && S.meal) {
        let content = "";
        if (S.tab === "profile") content = renderProfileTab();
        if (S.tab === "goal") content = renderGoalTab();
        if (S.tab === "weekly") content = renderWeeklyTab();
        if (S.tab === "today") content = renderTodayTab();
        app.innerHTML = content + tabBar();
        return;
      }

      app.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#888">読み込み中…</div>`;
    }

    load();
    render();
  </script>
</body>
</html>
